      setLoading(false);
      if (r.success) {
        setDetail(r.data);
        setForm(f => ({ ...f, discount: String(r.data.discount||0), paid_amount: String(r.data.paid_amount||0), payment_method: r.data.payment_method||'cash', notes: r.data.notes||'', customer_id: r.data.customer_id ? String(r.data.customer_id) : '' }));
      }
    } catch(e) { setLoading(false); }
  };

  // search available products
  const doSearch = (q) => {
    setSearchQ(q);
    if (debRef.current) clearTimeout(debRef.current);
    if (!q.trim()) { setSearchResults([]); return; }
    debRef.current = setTimeout(async () => {
      setSearching(true);
      const r = await serverCall('searchProductByBarcode', q.trim(), 0);
      setSearching(false);
      if (r.success) setSearchResults(r.data);
    }, 300);
  };

  // add item
  const handleAddItem = async (product) => {
    setItemLoad(`Adding ${product.serial}...` + '...');
    setSearchQ(''); setSearchResults([]);
    try {
      const r = await serverCall('addSaleItem', sale.id, product.id, product.sell_rate, user.id, user.role);
      setItemLoad('');
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:800, showConfirmButton:false }); loadDetail(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setItemLoad(''); Swal.fire({ icon:'error', text:'Failed' }); }
  };

  // remove item
  const handleRemoveItem = (item) => {
    Swal.fire({ icon:'warning', title:'Return Item?', text:'Return ' + item.serial + '? Item will be restored to stock.', input:'text', inputPlaceholder:'Reason (optional)', showCancelButton:true, confirmButtonColor:'#e65100', confirmButtonText:'Return' }).then(async (res) => {
      if (res.isConfirmed) {
        setItemLoad('Returning ' + item.serial + '...');
        try {
          const r = await serverCall('returnSaleItem', item.id, sale.id, res.value || '', user.id, user.role);
          setItemLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:800, showConfirmButton:false }); loadDetail(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setItemLoad(''); Swal.fire({ icon:'error', text:'Failed' }); }
      }
    });
  };

  // calcs from detail
  const subtotal = detail ? (detail.subtotal || detail.items.reduce((s, i) => s + (i.total||0), 0)) : 0;
  const disc = parseFloat(form.discount) || 0;
  const grandTotal = Math.round((subtotal - disc) * 100) / 100;
  const paid = Math.min(parseFloat(form.paid_amount) || 0, grandTotal);
  const due = Math.round((grandTotal - paid) * 100) / 100;

  const custOpts = customers.map(c => ({ value: String(c.id), label: c.name }));
  const methods = ['cash','bank','bkash','nagad','cheque','credit'];

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSaving(true);
    try {
      const r = await serverCall('updateSale', { id: sale.id, customer_id: form.customer_id || '', discount: disc, paid_amount: paid, payment_method: form.payment_method, notes: form.notes }, user.id, user.role);
      setSaving(false);
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); onSaved(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setSaving(false); Swal.fire({ icon:'error', text:'Update failed' }); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'820px', maxHeight:'90vh', display:'flex', flexDirection:'column'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header"><h3><i className="fas fa-edit"></i> Edit Sale — {sale.invoice_no}</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
        <div className="modal-body" style={{overflowY:'auto', flex:1}}>

          {/* inline loading */}
          {loading ? (
            <div style={{padding:'40px 20px', display:'flex', flexDirection:'column', alignItems:'center', gap:'12px'}}>
              <div className="loading-progress" style={{unit_qty:'200px'}}><div className="loading-progress-bar"></div></div>
              <span style={{fontSize:'14px', color:'#888'}}>Loading sale details...</span>
            </div>
          ) : detail ? (
            <div>
              {/* item loading bar */}
              {itemLoad && (
                <div style={{marginBottom:'16px', padding:'10px 16px', background:'#f0f7ff', borderRadius:'4px', display:'flex', alignItems:'center', gap:'12px'}}>
                  <div className="loading-progress" style={{unit_qty:'120px'}}><div className="loading-progress-bar"></div></div>
                  <span style={{fontSize:'13px', color:'var(--navy-accent)', fontWeight:'500'}}>{itemLoad}</span>
                </div>
              )}

              {/* ── Sale Items ── */}
              <div style={{marginBottom:'20px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'10px'}}>
                  <h4 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', display:'flex', alignItems:'center', gap:'8px'}}><i className="fas fa-box-open"></i> Sale Items ({detail.items.length})</h4>
                  <button type="button" className="btn btn-success btn-sm" onClick={() => setShowSearch(!showSearch)}><i className={'fas ' + (showSearch ? 'fa-times' : 'fa-plus')}></i> {showSearch ? 'Close' : 'Add Item'}</button>
                </div>

                {/* items table */}
                {detail.items.length > 0 ? (
                  <div style={{border:'1px solid #e0e0e0', borderRadius:'4px', overflowX:'auto', marginBottom:'12px'}}>
                    <table className="cart-table" style={{marginBottom:0}}>
                      <thead><tr><th>#</th><th>Serial</th><th>Unit Qty</th><th>Unit</th><th>Stock</th><th>Price/Unit</th><th>Total</th><th></th></tr></thead>
                      <tbody>
                        {detail.items.map((item, i) => (
                          <tr key={item.id || i}>
                            <td>{i+1}</td>
                            <td><strong>{item.serial}</strong></td>
                            <td>{item.width}"</td>
                            <td>{item.length}'</td>
                            <td>{(item.cft||0).toFixed(4)}</td>
                            <td>{CS()}{(item.rate||0).toLocaleString()}</td>
                            <td><strong>{CS()}{(item.total||0).toLocaleString()}</strong></td>
                            <td>{detail.items.length > 1 && <button type="button" className="cart-remove" onClick={() => handleRemoveItem(item)} title="Remove item"><i className="fas fa-times-circle"></i></button>}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div className="empty-state" style={{padding:'16px'}}><i className="fas fa-inbox"></i><p>No items — add products to this sale</p></div>
                )}

                {/* add item search */}
                {showSearch && (
                  <div style={{border:'1px solid #e0e0e0', borderRadius:'4px', padding:'12px', background:'#fafafa'}}>
                    <div className="pos-search" style={{marginBottom:'8px'}}>
                      <i className="fas fa-search search-icon"></i>
                      <input type="text" value={searchQ} onChange={(e) => doSearch(e.target.value)} placeholder="Search serial number to add..." autoFocus autoComplete="off" />
                    </div>
                    <div style={{maxHeight:'180px', overflowY:'auto'}}>
                      {searching && <div style={{padding:'10px', textAlign:'center', color:'#888'}}><i className="fas fa-spinner fa-spin"></i> Searching...</div>}
                      {!searching && searchResults.length > 0 && searchResults.map((w, i) => (
                        <div key={i} className="pos-result-item" onClick={() => handleAddItem(w)}>
                          <div><span className="pos-result-serial">{w.serial}{(w.qty||1) > 1 ? ' ×'+w.qty : ''}</span><div className="pos-result-info">{w.category_name} — {w.width}" × {w.length}' — {(w.cft||0).toFixed(4)} units</div></div>
                          <span className="pos-result-price">{CS()}{(w.sell_price||0).toLocaleString()}</span>
                        </div>
                      ))}
                      {!searching && searchQ.length > 1 && searchResults.length === 0 && <div style={{padding:'10px', textAlign:'center', color:'#aaa'}}>No available products found</div>}
                      {!searching && !searchQ && <div style={{padding:'10px', textAlign:'center', color:'#aaa', fontSize:'13px'}}>Type serial number to search...</div>}
                    </div>
                  </div>
                )}
              </div>

              {/* ── Settings ── */}
              <form onSubmit={handleSubmit}>
                <div style={{borderTop:'1px solid #e0e0e0', paddingTop:'16px'}}>
                  <h4 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px'}}><i className="fas fa-sliders-h"></i> Sale Settings</h4>

                  <SearchableDropdown label="Customer" icon="fas fa-user" options={custOpts} value={form.customer_id} onChange={(v) => setForm({...form, customer_id:v})} placeholder="Walk-in Customer" />

                  <div className="form-grid">
                    <div className="form-group"><label><i className="fas fa-tag"></i> Discount (TK)</label><input type="number" step="0.01" value={form.discount} onChange={(e) => setForm({...form, discount:e.target.value})} /></div>
                    <div className="form-group"><label><i className="fas fa-money-bill-wave"></i> Paid Amount (UGX)</label><input type="number" step="0.01" value={form.paid_amount} onChange={(e) => setForm({...form, paid_amount:e.target.value})} /></div>
                  </div>

                  {/* live calc */}
                  <div className="calc-panel" style={{marginBottom:'16px'}}>
                    <div className="calc-row"><span className="calc-label">Subtotal ({detail.items.length} items)</span><span className="calc-val">{CS()}{Math.round(subtotal).toLocaleString()}</span></div>
                    {disc > 0 && <div className="calc-row"><span className="calc-label">Discount</span><span className="calc-val" style={{color:'#c62828'}}>-{CS()}{disc.toLocaleString()}</span></div>}
                    <div className="calc-row"><span className="calc-label">Grand Total</span><span className="calc-val" style={{fontWeight:'700', fontSize:'15px'}}>{CS()}{grandTotal.toLocaleString()}</span></div>
                    <div className="calc-row"><span className="calc-label">Paid</span><span className="calc-val" style={{color:'#2e7d32'}}>{CS()}{paid.toLocaleString()}</span></div>
                    <div className="calc-row"><span className="calc-label">Due</span><span className={'calc-val' + (due > 0 ? ' due-amount' : '')}>{due > 0 ? CS() + due.toLocaleString() : '0'}</span></div>
                  </div>

                  <div>
                    <label style={{fontSize:'13px', fontWeight:'600', color:'#555', marginBottom:'8px', display:'block'}}><i className="fas fa-credit-card"></i> Payment Method</label>
                    <div className="pay-methods" style={{marginBottom:'16px'}}>
                      {methods.map(m => <button key={m} type="button" className={'pay-method ' + (form.payment_method===m?'active':'')} onClick={() => setForm({...form, payment_method:m})}>{m}</button>)}
                    </div>
                  </div>

                  <div className="form-group"><label><i className="fas fa-sticky-note"></i> Notes</label><textarea rows="2" value={form.notes} onChange={(e) => setForm({...form, notes:e.target.value})} style={{resize:'vertical'}}></textarea></div>

                  <div className="form-actions">
                    <button type="submit" className="btn btn-primary" disabled={saving || !!itemLoad}>{saving ? <><i className="fas fa-spinner fa-spin"></i> Saving...</> : <><i className="fas fa-save"></i> Save Changes</>}</button>
                    <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
                  </div>
                </div>
              </form>
            </div>
          ) : (
            <div className="empty-state"><i className="fas fa-exclamation-circle"></i><p>Failed to load sale</p></div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Payments Page (standalone with tabs) ── */
function PaymentsPageView({ user }) {
  const _c = swrGet('payments');
  const [loading, setLoading] = useState(!_c);
  const [payments, setPayments] = useState(_c || []);
  const [activeTab, setActiveTab] = useState('customer_payment');
  const custTableRef = useRef(null);
  const suppTableRef = useRef(null);
  const [filters, setFilters] = useState({ method:'', dateFrom:'', dateTo:'' });

  useEffect(() => {
    if (_c) setTimeout(() => {
      initTab('customer_payment', _c.filter(p => p.payment_type === 'customer_payment'), custTableRef, 'custPaymentsTable');
      initTab('supplier_payment', _c.filter(p => p.payment_type === 'supplier_payment'), suppTableRef, 'suppPaymentsTable');
    }, 200);
    loadPayments();
    return () => { dtCleanup(); [custTableRef, suppTableRef].forEach(r => { if (r.current) { try { r.current.destroy(); r.current=null; } catch(e){} } }); };
  }, []);

  const loadPayments = async () => {
    if (!_c) setLoading(true);
    try {
      const r = await serverCall('getPayments', user.id, user.role);
      setLoading(false);
      if (r.success) {
        swrSet('payments', r.data); setPayments(r.data);
        setTimeout(() => {
          initTab('customer_payment', r.data.filter(p => p.payment_type === 'customer_payment'), custTableRef, 'custPaymentsTable');
          initTab('supplier_payment', r.data.filter(p => p.payment_type === 'supplier_payment'), suppTableRef, 'suppPaymentsTable');
        }, 200);
      }
    } catch(e) { setLoading(false); }
  };

  const initTab = (type, data, tableRefObj, tableId) => {
    if (tableRefObj.current) { try { tableRefObj.current.destroy(); $('#'+tableId).empty(); } catch(e){} }
    if (!data.length) return;
    setTimeout(() => {
      try {
        tableRefObj.current = $('#'+tableId).DataTable({
          data, destroy:true,
          columns:[
            { data:'date', title:'Date', render:(d) => fmtDateShort(d) },
            { data:'ref_no', title: type==='customer_payment' ? 'Invoice' : 'Purchase', render:(d) => d ? '<strong>' + d + '</strong>' : '—' },
            { data:'party_name', title: type==='customer_payment' ? 'Customer' : 'Supplier' },
            { data:'amount', title:'Amount (TK)', render:(d) => '<strong class="paid-amount">' + CS() + (d||0).toLocaleString() + '</strong>' },
            { data:'method', title:'Method', render:(d) => '<span class="pay-method active" style="font-size:11px;padding:3px 8px;cursor:default">' + (d||'-') + '</span>' },
            { data:'reference', title:'Reference', render:(d) => d || '—' },
            { data:'created_by_name', title:'Recorded By' }
          ],
          pageUnit:15, responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV' },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF' },
            { extend:'print', text:'<i class="fas fa-print"></i> Print' }
          ],
          order:[[0,'desc']]
        });
      } catch(e) {}
    }, 50);
  };

  // filters
  const methodOpts = ['cash','bank','bkash','nagad','cheque'].map(m => ({ value:m, label:m }));
  const applyFilters = () => {
    const ref = activeTab === 'customer_payment' ? custTableRef : suppTableRef;
    if (!ref.current) return;
    const dt = ref.current;
    while ($.fn.dataTable.ext.search.length > 0) $.fn.dataTable.ext.search.pop();
    if (filters.dateFrom || filters.dateTo) {
      $.fn.dataTable.ext.search.push((s,sd,idx) => {
        const row = dt.row(idx).data(); if (!row) return true;
        const d = new Date(row.date);
        if (filters.dateFrom && d < new Date(filters.dateFrom)) return false;
        if (filters.dateTo && d > new Date(filters.dateTo + 'T23:59:59')) return false;
        return true;
      });
    }
    dt.columns().search('');
    if (filters.method) dt.column(4).search(filters.method);
    dt.draw();
  };
  const clearFilters = () => {
    setFilters({ method:'', dateFrom:'', dateTo:'' });
    [custTableRef, suppTableRef].forEach(r => { if (r.current) { while ($.fn.dataTable.ext.search.length>0) $.fn.dataTable.ext.search.pop(); r.current.columns().search('').draw(); } });
  };
  useEffect(() => { if (!loading && payments.length > 0) applyFilters(); }, [filters, activeTab]);

  const custPayments = payments.filter(p => p.payment_type === 'customer_payment');
  const suppPayments = payments.filter(p => p.payment_type === 'supplier_payment');

  return (
    <div className="data-section">
      <div className="section-header"><h2><i className="fas fa-money-bill-wave"></i> Payments</h2></div>

      {!loading && (
        <div className="filters-section">
          <div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Clear</button></div>
          <div className="filters-grid">
            <SearchableDropdown label="Method" icon="fas fa-credit-card" options={methodOpts} value={filters.method} onChange={(v) => setFilters({...filters, method:v})} placeholder="All Methods" />
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters({...filters, dateFrom:e.target.value})} /></div>
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters({...filters, dateTo:e.target.value})} /></div>
          </div>
        </div>
      )}

      <div className="ledger-tabs">
        <button className={`ledger-tab ${activeTab==='customer_payment'?'active':''}`} onClick={() => setActiveTab('customer_payment')}><i className="fas fa-user-friends"></i> Customer Payments ({custPayments.length})</button>
        <button className={`ledger-tab ${activeTab==='supplier_payment'?'active':''}`} onClick={() => setActiveTab('supplier_payment')}><i className="fas fa-handshake"></i> Supplier Payments ({suppPayments.length})</button>
      </div>

      {loading && <TableSkeleton rows={5} columns={7} />}

      <div style={{ display: !loading && activeTab==='customer_payment' ? 'block' : 'none' }}>
        {custPayments.length > 0 ? <table id="custPaymentsTable" className="display" style={{width:'100%'}}></table> : (!loading && <div className="empty-state"><i className="fas fa-inbox"></i><p>No customer payments</p></div>)}
      </div>
      <div style={{ display: !loading && activeTab==='supplier_payment' ? 'block' : 'none' }}>
        {suppPayments.length > 0 ? <table id="suppPaymentsTable" className="display" style={{width:'100%'}}></table> : (!loading && <div className="empty-state"><i className="fas fa-inbox"></i><p>No supplier payments</p></div>)}
      </div>
    </div>
  );
}

/* ── Expenses ── */
function ExpensesView({ user }) {
  const _c = swrGet('expenses');
  const [loading, setLoading] = useState(!_c);
  const [expenses, setExpenses] = useState(_c || []);
  const [showModal, setShowModal] = useState(false);
  const [editingEx, setEditingEx] = useState(null);
  const [load, setLoad] = useState('');
  const [filters, setFilters] = useState({ category:'', dateFrom:'', dateTo:'' });
  const tableRef = useRef(null);
  const canDelete = user.role === 'admin';

  const CAT_COLORS = { transport:'#1565c0', labor:'#e65100', maintenance:'#6a1b9a', utility:'#00838f', rent:'#00695c', other:'#888' };
  const CAT_LABELS = { transport:'Transport', labor:'Labor', maintenance:'Maintenance', utility:'Utility', rent:'Rent', other:'Other' };

  useEffect(() => { if (_c) setTimeout(() => initTable(_c), 150); loadExpenses(); return () => { dtCleanup(); if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }; }, []);

  const loadExpenses = async () => {
    if (!_c) setLoading(true);
    try {
      const r = await serverCall('getExpenses', user.id, user.role);
      setLoading(false);
      if (r.success) { swrSet('expenses', r.data); setExpenses(r.data); initTable(r.data); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoading(false); }
  };

  // stats
  const stats = React.useMemo(() => {
    const now = new Date();
    const mStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const thisMonth = expenses.filter(e => new Date(e.expense_date) >= mStart);
    const monthTotal = thisMonth.reduce((s, e) => s + e.amount, 0);
    const catBreakdown = {};
    thisMonth.forEach(e => { catBreakdown[e.category] = (catBreakdown[e.category] || 0) + e.amount; });
    return { monthTotal, catBreakdown };
  }, [expenses]);

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#expTable').empty(); } catch(e){} }
    setTimeout(() => {
      try {
        const t = $('#expTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'title', title:'Title', render:(d) => '<strong>' + d + '</strong>' },
            { data:'category', title:'Category', render:(d) => '<span class="pur-status exp-' + d + '">' + (CAT_LABELS[d] || d) + '</span>' },
            { data:'amount', title:'Amount (TK)', render:(d) => '<strong>' + CS() + (d||0).toLocaleString() + '</strong>' },
            { data:'expense_date', title:'Date', render:(d) => fmtDateShort(d) },
            { data:'created_by_name', title:'Recorded By' },
            { data:null, title:'', orderable:false, unit_qty:'70px', render:(_,__,row) => {
              let h = '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button>';
              if (canDelete) h += '<button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>';
              return h;
            }}
          ],
          pageUnit:10, lengthMenu:[[10,25,50,-1],[10,25,50,"All"]], responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV', exportOptions:{columns:[0,1,2,3,4]} },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF', exportOptions:{columns:[0,1,2,3,4]} },
            { extend:'print', text:'<i class="fas fa-print"></i> Print', exportOptions:{columns:[0,1,2,3,4]} }
          ],
          order:[[3,'desc']]
        });
        $('#expTable').off('click', '.action-icon');
        $('#expTable').on('click', '.action-icon', function() {
          const action = $(this).data('action');
          const row = t.row($(this).parents('tr')).data();
          if (action === 'edit') { setEditingEx(row); setShowModal(true); }
          else if (action === 'delete') handleDelete(row);
        });
        tableRef.current = t;
      } catch(e) { console.error('expTable:', e); }
    }, 150);
  };

  // filters
  const catOpts = Object.entries(CAT_LABELS).map(([v, l]) => ({ value:v, label:l }));
  const applyFilters = () => {
    if (!tableRef.current) return;
    const dt = tableRef.current;
    while ($.fn.dataTable.ext.search.length > 0) $.fn.dataTable.ext.search.pop();
    if (filters.dateFrom || filters.dateTo) {
      $.fn.dataTable.ext.search.push((s,sd,idx) => {
        const row = dt.row(idx).data(); if (!row) return true;
        const d = new Date(row.expense_date);
        if (filters.dateFrom && d < new Date(filters.dateFrom)) return false;
        if (filters.dateTo && d > new Date(filters.dateTo + 'T23:59:59')) return false;
        return true;
      });
    }
    dt.columns().search('');
    if (filters.category) dt.column(1).search(filters.category);
    dt.draw();
  };
  const clearFilters = () => { setFilters({ category:'', dateFrom:'', dateTo:'' }); if (tableRef.current) { while ($.fn.dataTable.ext.search.length>0) $.fn.dataTable.ext.search.pop(); tableRef.current.columns().search('').draw(); } };
  useEffect(() => { if (tableRef.current && expenses.length > 0) applyFilters(); }, [filters]);

  const handleSave = async (formData, addAnother) => {
    setLoad(editingEx ? 'Updating...' : 'Adding...');
    try {
      let r;
      if (editingEx) r = await serverCall('updateExpense', { ...formData, id: editingEx.id }, user.id, user.role);
      else r = await serverCall('addExpense', formData, user.id, user.role);
      setLoad('');
      if (r.success) {
        if (addAnother && !editingEx) { Swal.fire({ icon:'success', text:r.message, timer:1000, showConfirmButton:false }); loadExpenses(); }
        else { setShowModal(false); setEditingEx(null); Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadExpenses(); }
      } else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Failed' }); }
  };

  const handleDelete = (ex) => {
    Swal.fire({ icon:'warning', title:'Delete?', text:'Delete "' + ex.title + '"?', showCancelButton:true, confirmButtonColor:'#ea4335', confirmButtonText:'Delete' }).then(async (res) => {
      if (res.isConfirmed) {
        setLoad('Deleting...');
        try {
          const r = await serverCall('deleteExpense', ex.id, user.id, user.role);
          setLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadExpenses(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Delete failed' }); }
      }
    });
  };

  return (
    <div>
      {/* monthly summary */}
      {!loading && (
        <div style={{marginBottom:'20px'}}>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
            <div className="stat-card" style={{borderLeftColor:'var(--navy-primary)'}}>
              <div className="stat-card-icon" style={{background:'var(--navy)'}}><i className="fas fa-calendar-check"></i></div>
              <div className="stat-card-value">{CS()}{Math.round(stats.monthTotal).toLocaleString()}</div>
              <div className="stat-card-label">This Month Total</div>
            </div>
            <div className="stat-card" style={{borderLeftColor:'var(--navy-accent)'}}>
              <div className="stat-card-icon" style={{background:'var(--navy)'}}><i className="fas fa-layer-group"></i></div>
              <div className="stat-card-value">{Object.keys(stats.catBreakdown).length}</div>
              <div className="stat-card-label">Categories</div>
            </div>
          </div>
          <div className="data-section" style={{padding:'16px 20px'}}>
            <h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px'}}><i className="fas fa-tags"></i> Breakdown</h3>
            <div className="exp-pills">
              {Object.entries(stats.catBreakdown).sort((a,b) => b[1]-a[1]).map(([cat, amt]) => (
                <span key={cat} className="exp-pill" style={{background: CAT_COLORS[cat] + '15', color: CAT_COLORS[cat], border:'1px solid ' + CAT_COLORS[cat] + '30'}}>
                  <span className="dot" style={{background: CAT_COLORS[cat]}}></span>
                  {CAT_LABELS[cat] || cat}: {CS()}{Math.round(amt).toLocaleString()}
                </span>
              ))}
            </div>
          </div>
        </div>
      )}

      <div className="data-section">
        <div className="section-header">
          <h2><i className="fas fa-receipt"></i> Expenses</h2>
          <button className="btn btn-success" onClick={() => { setEditingEx(null); setShowModal(true); }}><i className="fas fa-plus"></i> Add Expense</button>
        </div>

        {!loading && (
          <div className="filters-section">
            <div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Clear All</button></div>
            <div className="filters-grid">
              <SearchableDropdown label="Category" icon="fas fa-tag" options={catOpts} value={filters.category} onChange={(v) => setFilters({...filters, category:v})} placeholder="All Categories" />
              <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters({...filters, dateFrom:e.target.value})} /></div>
              <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters({...filters, dateTo:e.target.value})} /></div>
            </div>
          </div>
        )}

        {loading && <TableSkeleton rows={5} columns={5} />}
        <div style={{ display: loading ? 'none' : 'block' }}><table id="expTable" className="display" style={{width:'100%'}}></table></div>
      </div>

      {showModal && <ExpenseModal editEx={editingEx} onClose={() => { setShowModal(false); setEditingEx(null); }} onSave={handleSave} />}
      {load && <div className="loading-ov"><div className="loading-popup"><div className="loading-progress"><div className="loading-progress-bar"></div></div><div className="loading-txt">{load}</div></div></div>}
    </div>
  );
}

/* ── Expense Modal ── */
function ExpenseModal({ editEx, onClose, onSave }) {
  const [form, setForm] = useState({
    title: editEx?.title || '', category: editEx?.category || 'other',
    amount: editEx?.amount || '', expense_date: editEx?.expense_date || new Date().toISOString().split('T')[0],
    notes: editEx?.notes || ''
  });
  const [addAnother, setAddAnother] = useState(false);

  const catOpts = [
    { value:'transport', label:'Transport' }, { value:'labor', label:'Labor' },
    { value:'maintenance', label:'Maintenance' }, { value:'utility', label:'Utility' },
    { value:'rent', label:'Rent' }, { value:'other', label:'Other' }
  ];

  const handleSubmit = (e) => {
    e.preventDefault();
    onSave(form, addAnother);
    if (addAnother && !editEx) setForm({ ...form, title:'', amount:'', notes:'' });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'500px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header"><h3><i className={editEx ? 'fas fa-edit' : 'fas fa-plus-circle'}></i> {editEx ? 'Edit' : 'Add'} Expense</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <div className="form-group"><label><i className="fas fa-heading"></i> Title *</label><input type="text" value={form.title} onChange={(e) => setForm({...form, title:e.target.value})} required autoFocus /></div>
            <div className="form-grid">
              <SearchableDropdown label="Category" icon="fas fa-tag" options={catOpts} value={form.category} onChange={(v) => setForm({...form, category:v||'other'})} placeholder="Select..." required />
              <div className="form-group"><label><i className="fas fa-money-bill-wave"></i> Amount (TK) *</label><input type="number" step="0.01" value={form.amount} onChange={(e) => setForm({...form, amount:e.target.value})} required /></div>
            </div>
            <div className="form-group"><label><i className="fas fa-calendar-alt"></i> Date</label><input type="date" value={form.expense_date} onChange={(e) => setForm({...form, expense_date:e.target.value})} /></div>
            <div className="form-group"><label><i className="fas fa-sticky-note"></i> Notes</label><textarea rows="2" value={form.notes} onChange={(e) => setForm({...form, notes:e.target.value})} style={{resize:'vertical'}}></textarea></div>
            {!editEx && (
              <div className="remember-me" style={{margin:'0 0 16px'}}>
                <input type="checkbox" id="addAnother" checked={addAnother} onChange={(e) => setAddAnother(e.target.checked)} />
                <label htmlFor="addAnother">Save & Add Another</label>
              </div>
            )}
            <div className="form-actions">
              <button type="submit" className="btn btn-primary"><i className="fas fa-save"></i> {editEx ? 'Update' : 'Save'}</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── Bulk Import Page (with history) ── */
function BulkImportPageView({ user }) {
  const _c = swrGet('import_logs');
  const [logs, setLogs] = useState(_c || []);
  const [loading, setLoading] = useState(!_c);
  const [showImportModal, setShowImportModal] = useState(false);
  const [errorDetail, setErrorDetail] = useState(null);
  const [cars, setCars] = useState([]);
  const tableRef = useRef(null);
  const canWrite = user.role === 'admin' || user.role === 'manager' || user.role === 'store_staff';

  useEffect(() => { if (_c) setTimeout(() => initTable(_c), 150); loadData(); return () => { if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }; }, []);

  const loadData = async () => {
    if (!_c) setLoading(true);
    try {
      const [ilRes, scRes] = await Promise.all([serverCall('getImportLogs', user.id, user.role), serverCall('getSubCategoriesForDropdown')]);
      setLoading(false);
      if (ilRes.success) { swrSet('import_logs', ilRes.data); setLogs(ilRes.data); initTable(ilRes.data); }
      if (scRes.success) setCars(scRes.data);
    } catch(e) { setLoading(false); }
  };

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#importLogTable').empty(); } catch(e){} }
    if (!data.length) return;
    setTimeout(() => {
      try {
        const t = $('#importLogTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'file_name', title:'File Name' },
            { data:'category_name', title:'Batch', render:(d) => '<span class="role-badge role-manager">' + d + '</span>' },
            { data:'total_rows', title:'Total', className:'dt-center' },
            { data:'success_rows', title:'Success', className:'dt-center', render:(d) => '<span class="paid-amount">' + d + '</span>' },
            { data:'failed_rows', title:'Failed', className:'dt-center', render:(d) => d > 0 ? '<span class="due-amount">' + d + '</span>' : '0' },
            { data:'status', title:'Status', render:(d) => '<span class="pur-status imp-' + d + '">' + d + '</span>' },
            { data:'created_by_name', title:'By' },
            { data:'created_at', title:'Date', render:(d) => fmtDateShort(d) },
            { data:null, title:'', orderable:false, unit_qty:'40px', render:(_,__,row) => row.failed_rows > 0 ? '<button class="action-icon ledger-icon" data-action="errors" title="View errors"><i class="fas fa-exclamation-triangle"></i></button>' : '' }
          ],
          pageUnit:10, responsive:true, dom:'Blfrtip',
          buttons:[{ extend:'csv', text:'CSV' },{ extend:'print', text:'Print' }],
          order:[[7,'desc']]
        });
        $('#importLogTable').off('click', '.action-icon');
        $('#importLogTable').on('click', '.action-icon', function() {
          const row = t.row($(this).parents('tr')).data();
          if (row.error_log) { try { setErrorDetail(JSON.parse(row.error_log)); } catch(e) { setErrorDetail([{ reason: row.error_log }]); } }
        });
        tableRef.current = t;
      } catch(e) {}
    }, 150);
  };

  return (
    <div>
      <div className="data-section" style={{marginBottom:'20px'}}>
        <div className="section-header">
          <h2><i className="fas fa-file-import"></i> Bulk Import</h2>
          {canWrite && <button className="btn btn-success" onClick={() => setShowImportModal(true)}><i className="fas fa-upload"></i> New Import</button>}
        </div>
        <p style={{color:'#666', fontSize:'14px', marginBottom:'16px'}}>Import products from CSV files. Select a car, upload your file, preview and confirm.</p>
      </div>

      <div className="data-section">
        <h2 style={{color:'#333', marginBottom:'15px', display:'flex', alignItems:'center', gap:'10px'}}><i className="fas fa-history"></i> Import History</h2>
        {loading && <TableSkeleton rows={4} columns={8} />}
        <div style={{ display: loading ? 'none' : 'block' }}>
          {logs.length > 0 ? <table id="importLogTable" className="display" style={{width:'100%'}}></table> : (!loading && <div className="empty-state"><i className="fas fa-inbox"></i><p>No imports yet</p></div>)}
        </div>
      </div>

      {showImportModal && <BulkImportModal user={user} cars={cars} onClose={() => setShowImportModal(false)} onDone={() => { setShowImportModal(false); loadData(); }} />}

      {errorDetail && (
        <div className="modal-overlay" onClick={() => setErrorDetail(null)}>
          <div className="modal" style={{maxWidth:'500px'}} onClick={(e) => e.stopPropagation()}>
            <div className="modal-header"><h3><i className="fas fa-exclamation-triangle"></i> Import Errors</h3><button className="close-btn" onClick={() => setErrorDetail(null)}><i className="fas fa-times"></i></button></div>
            <div className="modal-body" style={{maxHeight:'400px', overflowY:'auto'}}>
              {errorDetail.map((err, i) => (
                <div key={i} className="import-preview-row invalid" style={{marginBottom:'4px'}}>
                  {err.row && <strong>Row {err.row}: </strong>}{err.serial && <span>{err.serial} — </span>}{err.reason}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Settings (admin only) ── */
function SettingsView({ user, onSettingsUpdate }) {
  const [loading, setLoading] = useState(true);
  const [settings, setSettings] = useState({});
  const [saving, setSaving] = useState(false);
  const [openSections, setOpenSections] = useState({ business: true, rates: true, invoice: true });

  useEffect(() => { loadSettings(); }, []);

  const loadSettings = async () => {
    try {
      const r = await serverCall('getSettings');
      setLoading(false);
      if (r.success) setSettings(r.data);
    } catch(e) { setLoading(false); }
  };

  const updateField = (key, val) => setSettings(prev => ({ ...prev, [key]: val }));
  const toggleSection = (s) => setOpenSections(prev => ({ ...prev, [s]: !prev[s] }));

  const handleSave = async () => {
    setSaving(true);
    try {
      const r = await serverCall('saveAllSettings', settings, user.id, user.role);
      setSaving(false);
      if (r.success) { if (onSettingsUpdate) onSettingsUpdate(settings); Swal.fire({ icon:'success', text:'Settings saved! Changes applied.', timer:1500, showConfirmButton:false }); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setSaving(false); Swal.fire({ icon:'error', text:'Failed' }); }
  };

  if (loading) return <div className="data-section"><div className="skeleton skeleton-text-large" style={{unit_qty:'40%', marginBottom:'20px'}}></div><div className="skeleton skeleton-text" style={{unit_qty:'80%'}}></div><div className="skeleton skeleton-text" style={{unit_qty:'60%', marginTop:'12px'}}></div></div>;

  return (
    <div style={{width:'100%'}}>
      {/* Business Info */}
      <div className="settings-section">
        <div className="settings-section-header" onClick={() => toggleSection('business')}>
          <h3><i className="fas fa-building"></i> Business Information</h3>
          <i className={'fas fa-chevron-' + (openSections.business ? 'up' : 'down')} style={{color:'#888'}}></i>
        </div>
        {openSections.business && (
          <div className="settings-section-body">
            <div className="settings-grid">
              <div className="form-group"><label>Business Name</label><input type="text" value={settings.business_name || ''} onChange={(e) => updateField('business_name', e.target.value)} /></div>
              <div className="form-group"><label>Phone</label><input type="tel" value={settings.business_phone || ''} onChange={(e) => updateField('business_phone', e.target.value)} /></div>
            </div>
            <div className="form-group"><label>Address</label><textarea rows="2" value={settings.business_address || ''} onChange={(e) => updateField('business_address', e.target.value)} style={{resize:'vertical'}}></textarea></div>
            <div className="form-group" style={{maxWidth:'200px'}}><label>Currency Symbol</label><input type="text" value={settings.currency_symbol || CS()} onChange={(e) => updateField('currency_symbol', e.target.value)} /></div>
          </div>
        )}
      </div>

      {/* Default Rates */}
      <div className="settings-section">
        <div className="settings-section-header" onClick={() => toggleSection('rates')}>
          <h3><i className="fas fa-tag"></i> Default Rates</h3>
          <i className={'fas fa-chevron-' + (openSections.rates ? 'up' : 'down')} style={{color:'#888'}}></i>
        </div>
        {openSections.rates && (
          <div className="settings-section-body">
            <div className="settings-grid">
              <div className="form-group"><label>Default Buy Rate (UGX) per Unit (TK)</label><input type="number" step="0.01" value={settings.default_buy_rate || '1600'} onChange={(e) => updateField('default_buy_rate', e.target.value)} /></div>
              <div className="form-group"><label>Default Sell Rate per Unit (TK)</label><input type="number" step="0.01" value={settings.default_sell_rate || '16500'} onChange={(e) => updateField('default_sell_rate', e.target.value)} /></div>
            </div>
            <div className="form-group"><label>Stock Pricing Formula</label><div className="formula-display">buy_price = cost x qty | sell_price = sell_rate x qty</div></div>
          </div>
        )}
      </div>

      {/* Invoice Settings */}
      <div className="settings-section">
        <div className="settings-section-header" onClick={() => toggleSection('invoice')}>
          <h3><i className="fas fa-file-invoice"></i> Invoice Settings</h3>
          <i className={'fas fa-chevron-' + (openSections.invoice ? 'up' : 'down')} style={{color:'#888'}}></i>
        </div>
        {openSections.invoice && (
          <div className="settings-section-body">
            <div className="settings-grid">
              <div className="form-group"><label>Invoice Prefix</label><input type="text" value={settings.invoice_prefix || 'INV'} onChange={(e) => updateField('invoice_prefix', e.target.value)} /></div>
              <div className="form-group"><label>Purchase Prefix</label><input type="text" value={settings.purchase_prefix || 'PUR'} onChange={(e) => updateField('purchase_prefix', e.target.value)} /></div>
            </div>
            <div className="form-group"><label>Invoice Footer Text</label><textarea rows="2" value={settings.invoice_footer || ''} onChange={(e) => updateField('invoice_footer', e.target.value)} style={{resize:'vertical'}}></textarea></div>
          </div>
        )}
      </div>

      <div style={{textAlign:'right', marginTop:'10px'}}>
        <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
          {saving ? <><i className="fas fa-spinner fa-spin"></i> Saving...</> : <><i className="fas fa-save"></i> Save All Settings</>}
        </button>
      </div>
    </div>
  );
}

/* ── Due Reminders (full page) ── */
function DueRemindersView({ user }) {
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState(null);
  const custTableRef = useRef(null);
  const suppTableRef = useRef(null);

  useEffect(() => { loadData(); return () => { [custTableRef, suppTableRef].forEach(r => { if (r.current) { try { r.current.destroy(); r.current=null; } catch(e){} } }); }; }, []);

  const loadData = async () => {
    try {
      const r = await serverCall('getOverdueSummary', user.id, user.role);
      setLoading(false);
      if (r.success) { setData(r.data); setTimeout(() => { initTable(r.data.customers, custTableRef, 'dueCustTable', 'customer'); initTable(r.data.suppliers, suppTableRef, 'dueSuppTable', 'supplier'); }, 200); }
    } catch(e) { setLoading(false); }
  };

  const initTable = (items, ref, tableId, type) => {
    if (ref.current) { try { ref.current.destroy(); $('#'+tableId).empty(); } catch(e){} }
    if (!items?.length) return;
    setTimeout(() => {
      try {
        ref.current = $('#'+tableId).DataTable({ data:items, destroy:true, columns:[
          { data:'name', title:'Name', render:(d) => '<strong>' + d + '</strong>' },
          { data:'phone', title:'Phone', render:(d) => d ? '<a href="tel:' + d + '" class="batch-link">' + d + '</a>' : '—' },
          { data:'total_due', title:'Due Amount', render:(d) => '<span class="due-amount" style="font-weight:700">' + CS() + Math.round(d||0).toLocaleString() + '</span>' },
          { data:'days_overdue', title:'Days Overdue', render:(d) => { const cls = d <= 7 ? 'green' : d <= 30 ? 'orange' : 'red'; return '<span class="overdue-days ' + cls + '"><i class="fas fa-clock"></i> ' + d + 'd</span>'; } },
          { data:null, title:'', orderable:false, unit_qty:'50px', render:(_,__,row) => { const p = String(row.phone||''); const ph = p ? (p.replace(/^0/,'92')).replace(/[^0-9]/g,'') : ''; if (!ph) return ''; const msg = encodeURIComponent('Reminder: You have a pending payment of ' + CS() + Math.round(row.total_due).toLocaleString() + '. Please arrange payment at your earliest convenience. - ' + BN()); return '<a href="https://wa.me/' + ph + '?text=' + msg + '" target="_blank" class="wa-btn" style="padding:6px 10px;font-size:12px"><i class="fab fa-whatsapp"></i></a>'; } }
        ], pageUnit:25, responsive:true, dom:'Blfrtip', buttons:[{ extend:'csv', text:'CSV' },{ extend:'print', text:'Print' }], order:[[2,'desc']] });
      } catch(e){}
    }, 50);
  };

  if (loading) return <div><div className="skeleton-card"><div className="skeleton skeleton-text-large" style={{unit_qty:'40%'}}></div></div><TableSkeleton rows={5} columns={5} /></div>;

  return (
    <div>
      {/* summary cards */}
      {data && (
        <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'12px', marginBottom:'20px'}}>
          <div className="stat-card" style={{borderLeftColor:'#c62828'}}><div className="stat-card-icon" style={{background:'#ea4335', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-user-friends"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{Math.round(data.totalCustDue||0).toLocaleString()}</div><div className="stat-card-label">Customer Due</div></div>
          <div className="stat-card" style={{borderLeftColor:'#e65100'}}><div className="stat-card-icon" style={{background:'#fbbc04', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-handshake"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{Math.round(data.totalSuppDue||0).toLocaleString()}</div><div className="stat-card-label">Supplier Due</div></div>
          <div className="stat-card" style={{borderLeftColor:'#c62828'}}><div className="stat-card-icon" style={{background:'#ea4335', unit_qty:'45px', height:'45px', fontSize:'18px'}}><i className="fas fa-exclamation-triangle"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{(data.buckets?.customers?.over_30||0) + (data.buckets?.suppliers?.over_30||0)}</div><div className="stat-card-label">Over 30 Days</div></div>
          <div className="stat-card" style={{borderLeftColor:'var(--navy-primary)'}}><div className="stat-card-icon" style={{background:'var(--navy)', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-calculator"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{Math.round((data.totalCustDue||0) + (data.totalSuppDue||0)).toLocaleString()}</div><div className="stat-card-label">Total Outstanding</div></div>
        </div>
      )}

      {/* customer dues */}
      <div className="data-section" style={{marginBottom:'20px'}}>
        <div className="section-header"><h2><i className="fas fa-user-friends"></i> Customer Dues ({data?.customers?.length||0})</h2><button className="btn btn-primary btn-sm" onClick={loadData}><i className="fas fa-sync-alt"></i> Refresh</button></div>
        {data?.customers?.length > 0 ? <table id="dueCustTable" className="display" style={{width:'100%'}}></table> : (!loading && <div className="empty-state"><i className="fas fa-check-circle" style={{color:'#2e7d32'}}></i><p>No overdue customer payments</p></div>)}
      </div>

      {/* supplier dues */}
      <div className="data-section">
        <div className="section-header"><h2><i className="fas fa-handshake"></i> Supplier Dues ({data?.suppliers?.length||0})</h2></div>
        {data?.suppliers?.length > 0 ? <table id="dueSuppTable" className="display" style={{width:'100%'}}></table> : (!loading && <div className="empty-state"><i className="fas fa-check-circle" style={{color:'#2e7d32'}}></i><p>No overdue supplier payments</p></div>)}
      </div>
    </div>
  );
}

/* ── Reports Module ── */
function ReportsView({ user }) {
  const [activeReport, setActiveReport] = useState('profit_loss');
  const [loading, setLoading] = useState(false);
  const [data, setData] = useState(null);
  const [filters, setFilters] = useState({ dateFrom: new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0], dateTo: new Date().toISOString().split('T')[0], groupBy: 'daily' });
  const chartRef = useRef(null);
  const tableRef = useRef(null);

  const reports = [
    { id:'profit_loss', label:'Profit / Loss', icon:'fas fa-balance-scale', color:'#1565c0' },
    { id:'sales_summary', label:'Sales Summary', icon:'fas fa-chart-line', color:'#2e7d32' },
    { id:'stock_aging', label:'Stock Aging', icon:'fas fa-hourglass-half', color:'#e65100' },
    { id:'customer_profit', label:'Customer Analysis', icon:'fas fa-users', color:'#6f42c1' },
    { id:'car_report', label:'Car / Shipment P&L', icon:'fas fa-tag', color:'#00838f' }
  ];

  const loadReport = async () => {
    setLoading(true); setData(null);
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current = null; } catch(e){} }
    try {
      const r = await serverCall('getReportsData', activeReport, filters, user.id, user.role);
      setLoading(false);
      if (r.success) { setData(r.data); setTimeout(() => renderReport(activeReport, r.data), 200); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load report' }); }
  };

  useEffect(() => { loadReport(); }, [activeReport]);
  useEffect(() => { return () => { if (chartRef.current) chartRef.current.destroy(); if (tableRef.current) { try { tableRef.current.destroy(); } catch(e){} } }; }, []);

  const renderReport = (type, d) => {
    if (!d) return;
    // charts
    if (type === 'profit_loss' && d.dailyData?.length) {
      const ctx = document.getElementById('reportChart');
      if (ctx) {
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(ctx, { type:'bar', data:{ labels:d.dailyData.map(x => x.date), datasets:[
          { label:'Sales', data:d.dailyData.map(x => x.sales), backgroundColor:'rgba(46,125,50,0.7)', borderRadius:3 },
          { label:'Purchases', data:d.dailyData.map(x => x.purchases), backgroundColor:'rgba(21,101,192,0.7)', borderRadius:3 },
          { label:'Expenses', data:d.dailyData.map(x => x.expenses), backgroundColor:'rgba(198,40,40,0.5)', borderRadius:3 }
        ]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'} }, scales:{ y:{beginAtZero:true}, x:{grid:{display:false}} } } });
      }
    }
    if (type === 'sales_summary' && d.groupedData?.length) {
      const ctx = document.getElementById('reportChart');
      if (ctx) {
        if (chartRef.current) chartRef.current.destroy();
        const gr = ctx.getContext('2d').createLinearGradient(0,0,0,280);
        gr.addColorStop(0,'rgba(0,31,63,0.5)'); gr.addColorStop(1,'rgba(0,31,63,0)');
        chartRef.current = new Chart(ctx, { type:'line', data:{ labels:d.groupedData.map(x => x.label), datasets:[{ label:'Sales', data:d.groupedData.map(x => x.amount), borderColor:'#001f3f', backgroundColor:gr, fill:true, tension:0.4, pointRadius:3 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{beginAtZero:true}, x:{grid:{display:false}} } } });
      }
    }
    if (type === 'stock_aging' && d.buckets?.length) {
      const ctx = document.getElementById('reportChart');
      if (ctx) {
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(ctx, { type:'doughnut', data:{ labels:d.buckets.map(b => b.label), datasets:[{ data:d.buckets.map(b => b.count), backgroundColor:['#2e7d32','#e65100','#c62828','#b71c1c'], borderWidth:2, borderColor:'#fff', hoverOffset:8 }] }, options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{position:'bottom'} } } });
      }
    }
    // tables
    const items = d.items || d.customers || d.cars || [];
    if ((type === 'customer_profit' || type === 'car_report') && items.length) {
      const tid = '#reportTable';
      if (tableRef.current) { try { tableRef.current.destroy(); $(tid).empty(); } catch(e){} }
      setTimeout(() => {
        try {
          const cols = type === 'customer_profit' ? [
            { data:'name', title:'Customer', render:(d) => '<strong>' + d + '</strong>' },
            { data:'phone', title:'Phone', render:(d) => d || '—' },
            { data:'saleCount', title:'Sales', className:'dt-center' },
            { data:'totalSales', title:'Revenue', render:(d) => '<strong>' + CS() + (d||0).toLocaleString() + '</strong>' },
            { data:'avgTicket', title:'Avg Ticket', render:(d) => CS() + Math.round(d||0).toLocaleString() }
          ] : [
            { data:'name', title:'Batch / Shipment', render:(d) => '<strong>' + d + '</strong>' },
            { data:'category', title:'Category' },
            { data:'totalPieces', title:'Pieces', className:'dt-center' },
            { data:'totalCft', title:'Stock', render:(d) => (d||0).toFixed(2) },
            { data:'purchaseCost', title:'Cost', render:(d) => CS() + (d||0).toLocaleString() },
            { data:'salesRevenue', title:'Revenue', render:(d) => '<strong>' + CS() + (d||0).toLocaleString() + '</strong>' },
            { data:'profit', title:'Profit', render:(d) => '<span class="' + (d >= 0 ? 'paid-amount' : 'due-amount') + '">' + CS() + Math.round(d||0).toLocaleString() + '</span>' }
          ];
          tableRef.current = $(tid).DataTable({ data:items, destroy:true, columns:cols, pageUnit:25, responsive:true, dom:'Blfrtip', buttons:[{ extend:'csv', text:'CSV' },{ extend:'pdf', text:'PDF' },{ extend:'print', text:'Print' }], order:[[cols.length-1,'desc']] });
        } catch(e){}
      }, 50);
    }
    if (type === 'stock_aging' && d.oldStock?.length) {
      const tid = '#reportTable';
      if (tableRef.current) { try { tableRef.current.destroy(); $(tid).empty(); } catch(e){} }
      setTimeout(() => {
        try {
          tableRef.current = $(tid).DataTable({ data:d.oldStock, destroy:true, columns:[
            { data:'serial', title:'Serial #', render:(d) => '<strong>' + d + '</strong>' },
            { data:'category_name', title:'Batch' },
            { data:'days', title:'Days', render:(d) => '<span class="due-amount">' + d + ' days</span>' },
            { data:'cft', title:'Stock', render:(d) => (d||0).toFixed(4) },
            { data:'sell_price', title:'Value', render:(d) => CS() + (d||0).toLocaleString() }
          ], pageUnit:25, responsive:true, dom:'Blfrtip', buttons:[{ extend:'csv', text:'CSV' },{ extend:'print', text:'Print' }], order:[[2,'desc']] });
        } catch(e){}
      }, 50);
    }
  };

  const groupByOpts = [{ value:'daily', label:'Daily' },{ value:'weekly', label:'Weekly' },{ value:'monthly', label:'Monthly' }];

  return (
    <div>
      {/* report tabs */}
      <div style={{display:'flex', gap:'10px', flexWrap:'wrap', marginBottom:'20px'}}>
        {reports.map(r => (
          <button key={r.id} className={'btn btn-sm ' + (activeReport===r.id ? 'btn-primary' : 'btn-secondary')} style={activeReport===r.id ? {background:r.color, borderColor:r.color} : {}} onClick={() => setActiveReport(r.id)}>
            <i className={r.icon} style={{marginRight:'6px'}}></i>{r.label}
          </button>
        ))}
      </div>

      {/* date filters */}
      {activeReport !== 'stock_aging' && (
        <div className="filters-section" style={{marginBottom:'20px', padding:'14px 16px'}}>
          <div className="filters-header" style={{marginBottom:'12px', paddingBottom:'10px'}}><h3 style={{fontSize:'15px'}}><i className="fas fa-calendar-alt"></i> Date Range</h3><button className="btn btn-primary btn-sm" onClick={loadReport}><i className="fas fa-sync-alt"></i> Generate</button></div>
          <div className="filters-grid" style={{gap:'12px'}}>
            <div className="filter-group"><label><i className="fas fa-calendar"></i> From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters({...filters, dateFrom:e.target.value})} /></div>
            <div className="filter-group"><label><i className="fas fa-calendar"></i> To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters({...filters, dateTo:e.target.value})} /></div>
            {activeReport === 'sales_summary' && <SearchableDropdown label="Group By" icon="fas fa-layer-group" options={groupByOpts} value={filters.groupBy} onChange={(v) => setFilters({...filters, groupBy:v||'daily'})} placeholder="Daily" />}
          </div>
        </div>
      )}
      {activeReport === 'stock_aging' && (
        <div style={{marginBottom:'16px', textAlign:'right'}}><button className="btn btn-primary btn-sm" onClick={loadReport}><i className="fas fa-sync-alt"></i> Refresh</button></div>
      )}

      {/* loading */}
      {loading && (
        <div style={{padding:'60px 20px', display:'flex', flexDirection:'column', alignItems:'center', gap:'12px'}}>
          <div className="loading-progress" style={{unit_qty:'200px'}}><div className="loading-progress-bar"></div></div>
          <span style={{fontSize:'14px', color:'#888'}}>Generating report...</span>
        </div>
      )}

      {/* report content */}
      {!loading && data && (
        <div>
          {/* ── Profit/Loss ── */}
          {activeReport === 'profit_loss' && (
            <div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:'12px', marginBottom:'20px'}}>
                <div className="stat-card" style={{borderLeftColor:'#2e7d32'}}><div className="stat-card-icon" style={{background:'#34a853', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-arrow-up"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.totalSales||0).toLocaleString()}</div><div className="stat-card-label">Sales ({data.salesCount||0})</div></div>
                <div className="stat-card" style={{borderLeftColor:'#1565c0'}}><div className="stat-card-icon" style={{background:'#1565c0', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-arrow-down"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.totalPurchases||0).toLocaleString()}</div><div className="stat-card-label">Purchases ({data.purchasesCount||0})</div></div>
                <div className="stat-card" style={{borderLeftColor:'#c62828'}}><div className="stat-card-icon" style={{background:'#ea4335', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-receipt"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.totalExpenses||0).toLocaleString()}</div><div className="stat-card-label">Expenses</div></div>
                <div className="stat-card" style={{borderLeftColor:'#e65100'}}><div className="stat-card-icon" style={{background:'#fbbc04', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-chart-line"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.grossProfit||0).toLocaleString()}</div><div className="stat-card-label">Gross Profit</div></div>
                <div className="stat-card" style={{borderLeftColor: (data.netProfit||0) >= 0 ? '#2e7d32' : '#c62828'}}><div className="stat-card-icon" style={{background: (data.netProfit||0) >= 0 ? '#34a853' : '#ea4335', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-coins"></i></div><div className="stat-card-value" style={{fontSize:'22px', color:(data.netProfit||0) >= 0 ? '#2e7d32' : '#c62828'}}>{CS()}{(data.netProfit||0).toLocaleString()}</div><div className="stat-card-label">Net Profit</div></div>
              </div>
              {data.dailyData?.length > 0 && <div className="data-section" style={{padding:'16px'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px'}}><i className="fas fa-chart-bar"></i> Daily Breakdown</h3><div style={{height:'280px'}}><canvas id="reportChart"></canvas></div></div>}
            </div>
          )}

          {/* ── Sales Summary ── */}
          {activeReport === 'sales_summary' && (
            <div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'12px', marginBottom:'20px'}}>
                <div className="stat-card" style={{borderLeftColor:'#2e7d32'}}><div className="stat-card-icon" style={{background:'#34a853', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-coins"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.totalAmount||0).toLocaleString()}</div><div className="stat-card-label">Total Sales</div></div>
                <div className="stat-card" style={{borderLeftColor:'var(--navy-primary)'}}><div className="stat-card-icon" style={{background:'var(--navy)', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-shopping-bag"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{data.totalCount||0}</div><div className="stat-card-label">Total Orders</div></div>
                <div className="stat-card" style={{borderLeftColor:'#6f42c1'}}><div className="stat-card-icon" style={{background:'#6f42c1', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-ticket-alt"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{Math.round(data.avgTicket||0).toLocaleString()}</div><div className="stat-card-label">Avg Ticket</div></div>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'20px'}}>
                <div className="data-section" style={{padding:'16px'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'8px'}}><i className="fas fa-credit-card"></i> Payment Methods</h3>{data.methodBreakdown && Object.entries(data.methodBreakdown).sort((a,b) => b[1]-a[1]).map(([m, amt]) => <div key={m} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #f5f5f5', fontSize:'13px'}}><span className="pay-method active" style={{fontSize:'11px', padding:'3px 10px', cursor:'default'}}>{m}</span><strong>{CS()}{Math.round(amt).toLocaleString()}</strong></div>)}</div>
                <div className="data-section" style={{padding:'16px'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'8px'}}><i className="fas fa-flag"></i> Status</h3>{data.statusBreakdown && Object.entries(data.statusBreakdown).map(([s, info]) => <div key={s} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #f5f5f5', fontSize:'13px'}}><span className={'pur-status pur-' + s}>{s}</span><span>{info.count} orders — <strong>{CS()}{Math.round(info.amount).toLocaleString()}</strong></span></div>)}</div>
              </div>
              {data.groupedData?.length > 0 && <div className="data-section" style={{padding:'16px'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px'}}><i className="fas fa-chart-line"></i> Trend</h3><div style={{height:'250px'}}><canvas id="reportChart"></canvas></div></div>}
            </div>
          )}

          {/* ── Stock Aging ── */}
          {activeReport === 'stock_aging' && (
            <div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:'12px', marginBottom:'20px'}}>
                {(data.buckets||[]).map((b, i) => {
                  const colors = ['#2e7d32','#e65100','#c62828','#b71c1c'];
                  return <div key={i} className="stat-card" style={{borderLeftColor:colors[i]}}><div className="stat-card-icon" style={{background:colors[i], unit_qty:'45px', height:'45px', fontSize:'18px'}}><i className="fas fa-cubes"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{b.count}</div><div className="stat-card-label">{b.label} ({CS()}{Math.round(b.value).toLocaleString()})</div></div>;
                })}
              </div>
              <div style={{display:'grid', gridTemplateColumns:'250px 1fr', gap:'16px'}}>
                <div className="data-section" style={{padding:'16px', height:'fit-content'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px'}}><i className="fas fa-chart-pie"></i> Distribution</h3><div style={{height:'200px'}}><canvas id="reportChart"></canvas></div></div>
                <div className="data-section" style={{padding:'16px'}}><h3 style={{fontSize:'14px', fontWeight:'700', color:'var(--navy-primary)', marginBottom:'12px'}}><i className="fas fa-exclamation-triangle" style={{color:'#c62828'}}></i> Old Stock (90+ days)</h3>{data.oldStock?.length > 0 ? <table id="reportTable" className="display" style={{width:'100%'}}></table> : <div className="empty-state"><i className="fas fa-check-circle" style={{color:'#2e7d32'}}></i><p>No stock older than 90 days</p></div>}</div>
              </div>
            </div>
          )}

          {/* ── Customer Analysis ── */}
          {activeReport === 'customer_profit' && (
            <div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'12px', marginBottom:'20px'}}>
                <div className="stat-card" style={{borderLeftColor:'#6f42c1'}}><div className="stat-card-icon" style={{background:'#6f42c1', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-users"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{data.customers?.length||0}</div><div className="stat-card-label">Active Customers</div></div>
                <div className="stat-card" style={{borderLeftColor:'#2e7d32'}}><div className="stat-card-icon" style={{background:'#34a853', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-coins"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.customers||[]).reduce((s,c) => s + c.totalSales, 0).toLocaleString()}</div><div className="stat-card-label">Total Revenue</div></div>
                <div className="stat-card" style={{borderLeftColor:'var(--navy-primary)'}}><div className="stat-card-icon" style={{background:'var(--navy)', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-shopping-bag"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{(data.customers||[]).reduce((s,c) => s + c.saleCount, 0)}</div><div className="stat-card-label">Total Orders</div></div>
              </div>
              <div className="data-section" style={{padding:'16px'}}><table id="reportTable" className="display" style={{width:'100%'}}></table></div>
            </div>
          )}

          {/* ── Car / Shipment P&L ── */}
          {activeReport === 'car_report' && (
            <div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'12px', marginBottom:'20px'}}>
                <div className="stat-card" style={{borderLeftColor:'#1565c0'}}><div className="stat-card-icon" style={{background:'#1565c0', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-boxes"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{data.cars?.length||0}</div><div className="stat-card-label">Cars / Shipments</div></div>
                <div className="stat-card" style={{borderLeftColor:'#c62828'}}><div className="stat-card-icon" style={{background:'#ea4335', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-coins"></i></div><div className="stat-card-value" style={{fontSize:'22px'}}>{CS()}{(data.cars||[]).reduce((s,c) => s + c.purchaseCost, 0).toLocaleString()}</div><div className="stat-card-label">Total Cost</div></div>
                <div className="stat-card" style={{borderLeftColor:'#2e7d32'}}><div className="stat-card-icon" style={{background:'#34a853', unit_qty:'45px', height:'45px', fontSize:'20px'}}><i className="fas fa-chart-line"></i></div><div className="stat-card-value" style={{fontSize:'22px', color:(data.cars||[]).reduce((s,c) => s + c.profit, 0) >= 0 ? '#2e7d32' : '#c62828'}}>{CS()}{(data.cars||[]).reduce((s,c) => s + c.profit, 0).toLocaleString()}</div><div className="stat-card-label">Total Profit</div></div>
              </div>
              <div className="data-section" style={{padding:'16px'}}><table id="reportTable" className="display" style={{width:'100%'}}></table></div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

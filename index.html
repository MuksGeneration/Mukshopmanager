<style>
:root {
  /* === CLAUDE.md Navy Blue theme — solid colors only === */
  --navy: #001f3f;               /* primary brand per CLAUDE.md */
  --navy-hover: #002a52;         /* darker shade for hover (still solid) */
  --navy-accent: #0074D9;        /* secondary brand per CLAUDE.md (links, focus rings) */

  /* === Surfaces === */
  --bg-primary: #f5f5f5;         /* page background per docs/css-styles.md */
  --bg-secondary: #FFFFFF;       /* cards, sections, modals */
  --border: #e0e0e0;             /* dividers, input borders */

  /* === Text === */
  --text-primary: #333333;       /* body text on light bg */
  --text-secondary: #666666;     /* labels, helper text */

  /* === Semantic (Google palette per CLAUDE.md style) === */
  --accent-success: #34a853;
  --accent-success-hover: #2e8c47;
  --accent-warning: #fbbc04;
  --accent-warning-hover: #d8a200;
  --accent-danger: #ea4335;
  --accent-danger-hover: #c5392b;

  /* === Effects === */
  --shadow-sm: 0 1px 3px rgba(0, 31, 63, 0.08);
  --shadow-md: 0 4px 14px rgba(0, 31, 63, 0.12);
  --shadow-lg: 0 12px 32px rgba(0, 31, 63, 0.18);
  --radius-sm: 3px;
  --radius-md: 4px;
  --radius-lg: 8px;

  /* === Legacy aliases === */
  --navy-primary: var(--navy);
  --navy-dark: var(--navy);
  --navy-light: var(--navy);
  --bg: var(--bg-primary);
  --surface: var(--bg-secondary);
  --surface-alt: var(--bg-primary);
  --secondary: var(--border);
  --text: var(--text-primary);
  --text-muted: var(--text-secondary);
  --text-on-dark: #FFFFFF;
  --text-on-accent: #FFFFFF;
  --success: var(--accent-success);
  --success-text: var(--accent-success);
  --warning: var(--accent-warning);
  --warning-text: var(--accent-warning);
  --danger: var(--accent-danger);
  --danger-text: var(--accent-danger);
  --info: var(--navy-accent);
  --accent-gold: var(--accent-warning);
  --accent-coral: var(--accent-danger);
  --color-success: var(--accent-success);
  --color-warning: var(--accent-warning);
  --color-danger: var(--accent-danger);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; -moz-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
input, select, textarea { font-size: 16px !important; touch-action: manipulation; }

/* Initialize screen */
#root { width: 100%; height: 100%; }

/* buttons */
.btn { padding: 10px 20px; border: none; border-radius: 2px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; }
.btn-primary { background: var(--navy-primary); color: white; }
.btn-primary:hover { background: var(--navy-hover); transform: translateY(-2px); }
.btn-success { background: #34a853; color: white; }
.btn-success:hover { background: #2d8f47; }
.btn-danger { background: #ea4335; color: white; }
.btn-secondary { background: #6c757d; color: white; }
.btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

/* modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
.modal { background: white; border-radius: 4px; width: 80%; max-width: 600px; padding: 30px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); text-align: center; }
.modal h1 { color: #001f3f; margin-bottom: 15px; font-size: 24px; }
.modal p { color: #666; margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }

/* toast */
.toast-stack { position: fixed; top: 24px; right: 24px; z-index: 10001; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
.toast { background: white; border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,0.15); padding: 14px 16px; display: flex; align-items: center; gap: 12px; pointer-events: auto; border-left: 4px solid #0074D9; }
.toast.success { border-left-color: #34a853; }
.toast.success .toast-icon { color: #34a853; }
.toast.error { border-left-color: #ea4335; }
.toast.error .toast-icon { color: #ea4335; }
.toast-icon { font-size: 20px; }
.toast-msg { color: #333; }
@keyframes toast-in { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

<div id="root"></div>

<script>
// ============================================================
// Google Apps Script Native Connector (NO CORS NEEDED)
// ============================================================
console.log('🚀 Shop Management System Initializing...');
console.log('📍 Running as Google Apps Script Web App');

var _activeReqs = 0;
function _syncLoadingIcon() {
  var el = document.getElementById('globalLoadingIcon');
  if (el) el.style.display = _activeReqs > 0 ? 'inline-block' : 'none';
}

function serverCall(fn) {
  var args = Array.prototype.slice.call(arguments, 1);
  _activeReqs++; 
  _syncLoadingIcon();
  
  return new Promise(function(resolve, reject) {
    // When running as Google Apps Script, use native google.script.run
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      console.log('✅ Using native Google Apps Script API (NO CORS issues)');
      console.log('Calling function:', fn, 'with args:', args);
      
      var runner = google.script.run.withSuccessHandler(function(r) {
        _activeReqs--; 
        _syncLoadingIcon(); 
        console.log('✅ Response received:', r);
        resolve(r);
      }).withFailureHandler(function(e) {
        _activeReqs--; 
        _syncLoadingIcon(); 
        console.error('❌ Error from Apps Script:', e);
        reject(e);
      });
      
      runner[fn].apply(runner, args);
    } else {
      _activeReqs--;
      _syncLoadingIcon();
      console.error('❌ NOT running as Google Apps Script Web App');
      console.error('⚠️ This HTML must be deployed as a Google Apps Script Web App');
      console.error('📖 See instructions in the README or contact Muks Generation');
      reject(new Error('Not deployed as Google Apps Script Web App. This file must be used within Google Apps Script.'));
    }
  });
}

// SWR cache — localStorage backed
var _swrCache = {};
var _SWR_PFX = 'wpos_c_';
function swrGet(key) {
  if (_swrCache[key]) return _swrCache[key];
  try {
    var raw = localStorage.getItem(_SWR_PFX + key);
    if (!raw) return null;
    var entry = JSON.parse(raw);
    _swrCache[key] = entry.d;
    return entry.d;
  } catch(e) { return null; }
}
function swrSet(key, data) {
  _swrCache[key] = data;
  try { localStorage.setItem(_SWR_PFX + key, JSON.stringify({ d: data, t: Date.now() })); }
  catch(e) { }
}

// Simple Toast system
function showToast(message, type) {
  type = type || 'info';
  var stack = document.getElementById('toastStack');
  if (!stack) {
    stack = document.createElement('div');
    stack.id = 'toastStack';
    stack.className = 'toast-stack';
    document.body.appendChild(stack);
  }
  
  var iconClass = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-times-circle' : 'fa-info-circle';
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span class="toast-icon"><i class="fas ' + iconClass + '"></i></span><span class="toast-msg">' + message + '</span>';
  stack.appendChild(toast);
  
  setTimeout(function() { toast.remove(); }, 3000);
}

// Initialize App
document.addEventListener('DOMContentLoaded', function() {
  var root = document.getElementById('root');
  
  root.innerHTML = '<div class="modal" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1001; max-width: 500px;"><div style="background: var(--navy); color: white; padding: 20px; border-radius: 4px 4px 0 0;"><h2>Shop Management System</h2></div><div style="padding: 20px;"><p id="status" style="color: #666; margin-bottom: 20px;">Testing connection to Apps Script...</p><button id="testBtn" class="btn btn-primary">Test Connection</button></div></div>';
  
  var testBtn = document.getElementById('testBtn');
  var statusEl = document.getElementById('status');
  
  testBtn.onclick = function() {
    testBtn.disabled = true;
    statusEl.textContent = 'Testing connection...';
    
    // Try to call a simple function
    serverCall('login', 'test@example.com', 'test123')
      .then(function(result) {
        showToast('✓ Connection successful!', 'success');
        statusEl.textContent = '✓ Connected to Apps Script!';
        setTimeout(function() {
          root.innerHTML = '<p style="padding: 40px; text-align: center; color: #666;">System is ready. The app will now load the main interface...</p>';
        }, 1500);
      })
      .catch(function(error) {
        console.error('Connection error:', error);
        showToast('❌ Connection failed.', 'error');
        statusEl.innerHTML = '❌ Error: ' + (error.message || 'Unknown error') + '<br><small style="margin-top: 10px; display: block; color: #999;">This file must be deployed as a Google Apps Script Web App, not hosted on GitHub Pages.</small>';
        statusEl.style.color = '#ea4335';
        testBtn.disabled = false;
      });
  };
  
  // Auto-trigger test on load
  setTimeout(function() {
    if (typeof testBtn !== 'undefined' && testBtn) {
      testBtn.click();
    }
  }, 500);
});
</script>

  }

  // ── Admin & Manager dashboard ──
  return (
    <div>
      {Hero}
      {Alerts}
      {QuickActions}

      <div className="dash-kpis">
        <div className="dash-kpi">
          <div className="dash-kpi-head">
            <div className="dash-kpi-ico" style={{background:'#34a853'}}><i className="fas fa-cash-register"></i></div>
            {ds.length >= 2 && <span className={'dash-kpi-trend ' + trendCls}><i className={'fas ' + trendIco}></i> {Math.abs(pct)}%</span>}
          </div>
          <div className="dash-kpi-val">{tk(s?.todaySalesAmt)}</div>
          <div className="dash-kpi-lbl">Today Sales</div>
          {ds.length >= 2 && <div className="dash-kpi-extra">vs yesterday {tk(yest)}</div>}
        </div>
        <div className="dash-kpi">
          <div className="dash-kpi-head"><div className="dash-kpi-ico" style={{background:'var(--navy)'}}><i className="fas fa-coins"></i></div></div>
          <div className="dash-kpi-val">{tk(s?.todayCollectionAmt)}</div>
          <div className="dash-kpi-lbl">Today Collection</div>
        </div>
        <div className="dash-kpi">
          <div className="dash-kpi-head">
            <div className="dash-kpi-ico" style={{background:'#ea4335'}}><i className="fas fa-exclamation-triangle"></i></div>
            {overdue?.customers?.length > 0 && <span className="dash-kpi-trend down"><i className="fas fa-bell"></i> {overdue.customers.length}</span>}
          </div>
          <div className="dash-kpi-val danger">{tk(s?.totalCustDue)}</div>
          <div className="dash-kpi-lbl">Customer Due</div>
        </div>
        <div className="dash-kpi">
          <div className="dash-kpi-head"><div className="dash-kpi-ico" style={{background:'#fbbc04'}}><i className="fas fa-handshake"></i></div></div>
          <div className="dash-kpi-val">{tk(s?.totalSuppDue)}</div>
          <div className="dash-kpi-lbl">Supplier Due</div>
        </div>
        <div className="dash-kpi">
          <div className="dash-kpi-head"><div className="dash-kpi-ico" style={{background:'#6f42c1'}}><i className="fas fa-tags"></i></div></div>
          <div className="dash-kpi-val">{tk(s?.stockValue)}</div>
          <div className="dash-kpi-lbl">Stock Value</div>
        </div>
        <div className="dash-kpi">
          <div className="dash-kpi-head"><div className="dash-kpi-ico" style={{background:'#00838f'}}><i className="fas fa-receipt"></i></div></div>
          <div className="dash-kpi-val">{tk(s?.expThisMonth)}</div>
          <div className="dash-kpi-lbl">Expenses (Month)</div>
        </div>
      </div>

      <div className="dash-row-2">
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-chart-line"></i> Daily Sales (30 days)</h3>
          <div style={{height:'260px'}}><canvas id="dailySalesChart"></canvas></div>
        </div>
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-chart-pie"></i> Stock Status</h3>
          <div style={{height:'260px'}}><canvas id="stockPieChart"></canvas></div>
        </div>
      </div>

      <div className="dash-row-2 eq">
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-users"></i> Top Customers</h3>
          <div style={{height:'240px'}}><canvas id="topCustChart"></canvas></div>
        </div>
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-receipt"></i> Expense Breakdown (Month)</h3>
          <div style={{height:'240px'}}><canvas id="expDonutChart"></canvas></div>
        </div>
      </div>

      <div className="dash-row-2">
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-stream"></i> Recent Activity {feed.length > 0 && <span className="count" style={{marginLeft:'auto'}}>{feed.length}</span>}</h3>
          {feed.length > 0 ? (
            <ul className="dash-timeline">
              {feed.map((a, i) => (
                <li key={i} className="dash-tl-item">
                  <div className={'dash-tl-ico ' + a.type}><i className={'fas ' + (a.type === 'sale' ? 'fa-receipt' : a.type === 'payment' ? 'fa-money-bill-wave' : 'fa-box-open')}></i></div>
                  <div className="dash-tl-content">
                    <div className="dash-tl-text">{a.text}</div>
                    <div className="dash-tl-meta"><i className="fas fa-clock"></i> {fmtDate(a.date)} {a.amt != null && <span className="dash-tl-amt">{tk(a.amt)}</span>}</div>
                  </div>
                </li>
              ))}
            </ul>
          ) : <div className="dash-empty"><i className="fas fa-inbox"></i><p>No recent activity</p></div>}
        </div>
        <div className="dash-panel">
          <h3 className="dash-panel-title"><i className="fas fa-trophy"></i> Top Customers</h3>
          {s?.topCusts?.length > 0 ? (
            <ul className="dash-top">
              {s.topCusts.slice(0, 8).map((c, i) => (
                <li key={i} className="dash-top-item">
                  <div className="dash-top-rank">{i+1}</div>
                  <div className="dash-top-name">{c.name}</div>
                  <div className="dash-top-val">{tk(c.total)}</div>
                </li>
              ))}
            </ul>
          ) : <div className="dash-empty"><i className="fas fa-users"></i><p>No customer data yet</p></div>}
        </div>
      </div>

      {/* overdue payments — preserved with WhatsApp send buttons */}
      {overdue && (overdue.customers?.length > 0 || overdue.suppliers?.length > 0) && (
        <div className="dash-row-2 eq">
          {overdue.customers?.length > 0 && (
            <div className="dash-panel">
              <h3 className="dash-panel-title"><i className="fas fa-user-friends"></i> Customer Dues <span className="count" style={{marginLeft:'auto'}}>{overdue.customers.length}</span></h3>
              {overdue.customers.slice(0,5).map((c,i) => {
                const dCls = c.days_overdue <= 7 ? 'green' : c.days_overdue <= 30 ? 'orange' : 'red';
                const p = String(c.phone||''); const ph = p ? (p.startsWith('0') ? '92' + p.substring(1) : p).replace(/[^0-9]/g,'') : '';
                const waMsg = encodeURIComponent('Reminder: You have a pending payment of ' + CS() + Math.round(c.total_due).toLocaleString() + '. Please arrange payment at your earliest convenience. - ' + BN());
                return (
                  <div key={i} className="overdue-card">
                    <div className="oc-info">
                      <div className="oc-name">{c.name} <span className={'overdue-days ' + dCls}><i className="fas fa-clock"></i> {c.days_overdue}d</span></div>
                      <div className="oc-meta">
                        <span className="due-amount" style={{fontWeight:'700'}}>{tk(c.total_due)}</span>
                        {c.phone && <a href={'tel:' + c.phone} style={{color:'var(--navy-accent)', textDecoration:'none'}}><i className="fas fa-phone"></i> {c.phone}</a>}
                      </div>
                    </div>
                    {ph && <a href={'https://wa.me/' + ph + '?text=' + waMsg} target="_blank" className="wa-btn"><i className="fab fa-whatsapp"></i></a>}
                  </div>
                );
              })}
            </div>
          )}
          {overdue.suppliers?.length > 0 && (
            <div className="dash-panel">
              <h3 className="dash-panel-title"><i className="fas fa-handshake"></i> Supplier Dues <span className="count" style={{marginLeft:'auto'}}>{overdue.suppliers.length}</span></h3>
              {overdue.suppliers.slice(0,5).map((sp,i) => {
                const dCls = sp.days_overdue <= 7 ? 'green' : sp.days_overdue <= 30 ? 'orange' : 'red';
                const spp = String(sp.phone||''); const ph = spp ? (spp.startsWith('0') ? '92' + spp.substring(1) : spp).replace(/[^0-9]/g,'') : '';
                const waMsg = encodeURIComponent('Reminder: You have a pending payment of ' + CS() + Math.round(sp.total_due).toLocaleString() + '. Please arrange payment at your earliest convenience. - ' + BN());
                return (
                  <div key={i} className="overdue-card" style={{borderLeftColor:'#e65100'}}>
                    <div className="oc-info">
                      <div className="oc-name">{sp.name} <span className={'overdue-days ' + dCls}><i className="fas fa-clock"></i> {sp.days_overdue}d</span></div>
                      <div className="oc-meta">
                        <span className="due-amount" style={{fontWeight:'700'}}>{tk(sp.total_due)}</span>
                        {sp.phone && <a href={'tel:' + sp.phone} style={{color:'var(--navy-accent)', textDecoration:'none'}}><i className="fas fa-phone"></i> {sp.phone}</a>}
                      </div>
                    </div>
                    {ph && <a href={'https://wa.me/' + ph + '?text=' + waMsg} target="_blank" className="wa-btn"><i className="fab fa-whatsapp"></i></a>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Users Management ── */
function UsersView({ user }) {
  const _c = swrGet('users');
  const [loading, setLoading] = useState(!_c);
  const [users, setUsers] = useState(_c || []);
  const [showModal, setShowModal] = useState(false);
  const [editingUser, setEditingUser] = useState(null);
  const [load, setLoad] = useState('');
  const tableRef = useRef(null);
  const [filters, setFilters] = useState({ role:'', status:'', dateFrom:'', dateTo:'' });

  useEffect(() => { if (_c) setTimeout(() => initTable(_c), 150); loadUsers(); return () => { dtCleanup(); if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }; }, []);

  const loadUsers = async () => {
    if (!_c) setLoading(true);
    try {
      const r = await serverCall('getUsers', user.id, user.role);
      setLoading(false);
      if (r.success) { swrSet('users', r.data); setUsers(r.data); initTable(r.data); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load users' }); }
  };

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#usersTable').empty(); } catch(e){} }
    setTimeout(() => {
      try {
        const t = $('#usersTable').DataTable({
          data, destroy:true,
          columns: [
            { data:'avatar', title:'Avatar', orderable:false, unit_qty:'50px', render:(d,_,row) => d ? '<img src="' + avatarUrl(d) + '" class="dt-avatar" onerror="this.outerHTML=\'<span class=dt-avatar-ph>' + getInitials(row.full_name) + '</span>\'" />' : '<span class="dt-avatar-ph">' + getInitials(row.full_name) + '</span>' },
            { data:'full_name', title:'Full Name' },
            { data:'email', title:'Email' },
            { data:'phone', title:'Phone' },
            { data:'role', title:'Role', render:(d) => '<span class="role-badge role-' + d.replace('_','-') + '">' + (ROLE_LABELS[d]||d) + '</span>' },
            { data:'is_active', title:'Status', render:(d) => '<span class="status-dot ' + (d==1?'active':'inactive') + '"></span>' + (d==1?'Active':'Inactive') },
            { data:'created_at', title:'Created', render:(d) => fmtDateShort(d) },
            { data:null, title:'Actions', orderable:false, render:(_,__,row) => '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon toggle-icon ' + (row.is_active==1?'':'off') + '" data-action="toggle"><i class="fas ' + (row.is_active==1?'fa-toggle-on':'fa-toggle-off') + '"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>' }
          ],
          pageUnit:10, lengthMenu:[[10,25,50,100,-1],[10,25,50,100,"All"]], responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV', exportOptions:{columns:[1,2,3,4,5,6]} },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF', exportOptions:{columns:[1,2,3,4,5,6]} },
            { extend:'print', text:'<i class="fas fa-print"></i> Print', exportOptions:{columns:[1,2,3,4,5,6]} }
          ],
          order:[[6,'desc']]
        });

        $('#usersTable').off('click', '.action-icon');
        $('#usersTable').on('click', '.action-icon', function() {
          const action = $(this).data('action');
          const rowData = t.row($(this).parents('tr')).data();
          if (action === 'edit') { setEditingUser(rowData); setShowModal(true); }
          else if (action === 'toggle') handleToggle(rowData);
          else handleDelete(rowData);
        });
        tableRef.current = t;
      } catch(e) { console.error('DataTable:', e); }
    }, 150);
  };

  // filters
  const applyFilters = () => {
    if (!tableRef.current) return;
    const dt = tableRef.current;
    while ($.fn.dataTable.ext.search.length > 0) $.fn.dataTable.ext.search.pop();
    if (filters.dateFrom || filters.dateTo) {
      $.fn.dataTable.ext.search.push((s, sd, idx) => {
        const row = dt.row(idx).data(); if (!row) return true;
        const d = new Date(row.created_at);
        if (filters.dateFrom && d < new Date(filters.dateFrom)) return false;
        if (filters.dateTo && d > new Date(filters.dateTo + 'T23:59:59')) return false;
        return true;
      });
    }
    dt.columns().search('');
    if (filters.role) dt.column(4).search(filters.role);
    if (filters.status) dt.column(5).search(filters.status === '1' ? 'Active' : 'Inactive');
    dt.draw();
  };
  const clearFilters = () => { setFilters({ role:'', status:'', dateFrom:'', dateTo:'' }); if (tableRef.current) { while ($.fn.dataTable.ext.search.length>0) $.fn.dataTable.ext.search.pop(); tableRef.current.columns().search('').draw(); } };
  useEffect(() => { if (tableRef.current && users.length > 0) applyFilters(); }, [filters]);

  const handleSave = async (formData) => {
    setLoad(editingUser ? 'Updating user...' : 'Adding user...');
    try {
      let r;
      if (editingUser) r = await serverCall('updateUser', { ...formData, id: editingUser.id }, user.id, user.role);
      else r = await serverCall('addUser', formData, user.id, user.role);
      setLoad('');
      if (r.success) { setShowModal(false); setEditingUser(null); Swal.fire({ icon:'success', text:r.message, timer:2000, showConfirmButton:false }); loadUsers(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Operation failed' }); }
  };

  const handleToggle = (record) => {
    const msg = record.is_active == 1 ? 'Deactivate ' : 'Activate ';
    Swal.fire({ icon:'question', title: msg + record.full_name + '?', showCancelButton:true, confirmButtonColor:'var(--navy-primary)', confirmButtonText:'Yes' }).then(async (res) => {
      if (res.isConfirmed) {
        setLoad('Updating status...');
        try {
          const r = await serverCall('toggleUserStatus', record.id, user.id, user.role);
          setLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadUsers(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Toggle failed' }); }
      }
    });
  };

  const handleDelete = (record) => {
    Swal.fire({ icon:'warning', title:'Delete User?', text:'This will permanently remove ' + record.full_name, showCancelButton:true, confirmButtonColor:'#ea4335', confirmButtonText:'Delete' }).then(async (res) => {
      if (res.isConfirmed) {
        setLoad('Deleting...');
        try {
          const r = await serverCall('deleteUser', record.id, user.id, user.role);
          setLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadUsers(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Delete failed' }); }
      }
    });
  };

  const STATUS_OPTIONS = [{ value:'1', label:'Active' }, { value:'0', label:'Inactive' }];

  return (
    <div className="data-section">
      <div className="section-header">
        <h2><i className="fas fa-users-cog"></i> User Management</h2>
        <button className="btn btn-success" onClick={() => { setEditingUser(null); setShowModal(true); }}><i className="fas fa-plus"></i> Add User</button>
      </div>
      {!loading && (
        <div className="filters-section">
          <div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Clear All</button></div>
          <div className="filters-grid">
            <SearchableDropdown label="Role" icon="fas fa-user-tag" options={ROLE_OPTIONS} value={filters.role} onChange={(v) => setFilters({...filters, role:v})} placeholder="All Roles" />
            <SearchableDropdown label="Status" icon="fas fa-toggle-on" options={STATUS_OPTIONS} value={filters.status} onChange={(v) => setFilters({...filters, status:v})} placeholder="All Status" />
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters({...filters, dateFrom:e.target.value})} /></div>
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters({...filters, dateTo:e.target.value})} /></div>
          </div>
        </div>
      )}
      {loading && <TableSkeleton rows={6} columns={7} />}
      <div style={{ display: loading ? 'none' : 'block' }}><table id="usersTable" className="display" style={{width:'100%'}}></table></div>
      {showModal && <UserModal editUser={editingUser} onClose={() => { setShowModal(false); setEditingUser(null); }} onSave={handleSave} />}
      {load && <div className="loading-ov"><div className="loading-popup"><div className="loading-progress"><div className="loading-progress-bar"></div></div><div className="loading-txt">{load}</div></div></div>}
    </div>
  );
}

/* ── User Modal (2-col: Left=name,email,phone,pwd | Right=role,avatar,toggle) ── */
function UserModal({ editUser, onClose, onSave }) {
  const [form, setForm] = useState({
    full_name: editUser?.full_name || '', email: editUser?.email || '', phone: editUser?.phone || '',
    password: '', userRole: editUser?.role || 'cashier', is_active: editUser ? (editUser.is_active == 1) : true
  });
  const [avatarData, setAvatarData] = useState(null);
  const [removeAvatar, setRemoveAvatar] = useState(false);
  const [showPwdChange, setShowPwdChange] = useState(false);

  const handleAvatarChange = (data, remove) => {
    if (remove) { setAvatarData(null); setRemoveAvatar(true); }
    else { setAvatarData(data); setRemoveAvatar(false); }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!editUser && !form.password) { Swal.fire({ icon:'warning', text:'Password is required' }); return; }
    if (form.password && form.password.length < 6) { Swal.fire({ icon:'warning', text:'Password min 6 characters' }); return; }
    const payload = { ...form, is_active: form.is_active ? 1 : 0 };
    if (avatarData) payload.avatarData = avatarData;
    if (removeAvatar) payload.removeAvatar = true;
    onSave(payload);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className={editUser ? 'fas fa-user-edit' : 'fas fa-user-plus'}></i> {editUser ? 'Edit' : 'Add'} User</h3>
          <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <div className="user-form-layout">
              {/* LEFT */}
              <div>
                <div className="form-group"><label><i className="fas fa-user"></i> Full Name *</label><input type="text" value={form.full_name} onChange={(e) => setForm({...form, full_name:e.target.value})} required /></div>
                <div className="form-group"><label><i className="fas fa-envelope"></i> Email *</label><input type="email" value={form.email} onChange={(e) => setForm({...form, email:e.target.value})} required /></div>
                <div className="form-group"><label><i className="fas fa-phone"></i> Phone</label><input type="tel" value={form.phone} onChange={(e) => setForm({...form, phone:e.target.value})} /></div>
                {editUser ? (
                  showPwdChange ? (
                    <PasswordInput label="New Password" icon="fas fa-lock" value={form.password} onChange={(e) => setForm({...form, password:e.target.value})} placeholder="Min 6 characters" />
                  ) : (
                    <button type="button" className="change-pwd-link" onClick={() => setShowPwdChange(true)}><i className="fas fa-key"></i> Change Password</button>
                  )
                ) : (
                  <PasswordInput label="Password *" icon="fas fa-lock" value={form.password} onChange={(e) => setForm({...form, password:e.target.value})} placeholder="Min 6 characters" required={true} />
                )}
              </div>
              {/* RIGHT */}
              <div>
                <SearchableDropdown label="Role" icon="fas fa-user-tag" options={ROLE_OPTIONS} value={form.userRole} onChange={(v) => setForm({...form, userRole:v||'cashier'})} placeholder="Select role..." required />
                <AvatarUpload existingFileId={editUser?.avatar || ''} avatarData={avatarData} onChange={handleAvatarChange} />
                <ToggleSwitch label="Account Status" checked={form.is_active} onChange={(v) => setForm({...form, is_active:v})} />
              </div>
            </div>
            <div className="form-actions">
              <button type="submit" className="btn btn-primary"><i className="fas fa-save"></i> {editUser ? 'Update' : 'Add'} User</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── My Account (Profile Card + Edit Modal) ── */
function AccountView({ user, onUserUpdate }) {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showEdit, setShowEdit] = useState(false);
  const [showPwd, setShowPwd] = useState(false);
  const [load, setLoad] = useState('');

  useEffect(() => { loadProfile(); }, []);
  const loadProfile = async () => {
    try {
      const r = await serverCall('getProfile', user.id);
      setLoading(false);
      if (r.success) setProfile(r.data);
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load profile' }); }
  };

  if (loading) return <div><div className="skeleton-card"><div className="skeleton skeleton-icon" style={{unit_qty:'120px', height:'120px', borderRadius:'50%', margin:'0 auto 20px'}}></div><div className="skeleton skeleton-text-large" style={{unit_qty:'50%', margin:'0 auto 12px'}}></div><div className="skeleton skeleton-text" style={{unit_qty:'70%', margin:'0 auto'}}></div></div></div>;

  const initials = getInitials(profile?.full_name);

  return (
    <div>
      <div className="profile-hero">
        {profile?.avatar ? <img src={avatarUrl(profile.avatar)} className="profile-hero-avatar" alt="" /> : <div className="profile-hero-initials">{initials}</div>}
        <h2>{profile?.full_name}</h2>
        <div className="profile-hero-email"><i className="fas fa-envelope"></i> {profile?.email}</div>
        <div className="profile-hero-phone"><i className="fas fa-phone"></i> {profile?.phone || 'No phone'}</div>
        <div><span className={`role-badge role-${(profile?.role||'').replace('_','-')}`}>{ROLE_LABELS[profile?.role]||profile?.role}</span></div>
        <div className="profile-hero-actions">
          <button className="btn btn-primary" onClick={() => setShowEdit(true)}><i className="fas fa-user-edit"></i> Edit Profile</button>
          <button className="btn btn-secondary" onClick={() => setShowPwd(true)}><i className="fas fa-key"></i> Change Password</button>
        </div>
      </div>

      {/* Edit Profile Modal */}
      {showEdit && <ProfileEditModal profile={profile} userId={user.id} onClose={() => setShowEdit(false)} onSaved={(d) => { setProfile(p => ({...p, ...d})); onUserUpdate(d); setShowEdit(false); }} setLoad={setLoad} />}

      {/* Change Password Modal */}
      {showPwd && <PasswordChangeModal userId={user.id} onClose={() => setShowPwd(false)} setLoad={setLoad} />}

      {load && <div className="loading-ov"><div className="loading-popup"><div className="loading-progress"><div className="loading-progress-bar"></div></div><div className="loading-txt">{load}</div></div></div>}
    </div>
  );
}

function ProfileEditModal({ profile, userId, onClose, onSaved, setLoad }) {
  const [form, setForm] = useState({ full_name: profile.full_name, phone: profile.phone || '' });
  const [avatarData, setAvatarData] = useState(null);
  const [removeAvatar, setRemoveAvatar] = useState(false);

  const handleAvatarChange = (data, remove) => {
    if (remove) { setAvatarData(null); setRemoveAvatar(true); }
    else { setAvatarData(data); setRemoveAvatar(false); }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoad('Updating profile...');
    try {
      const payload = { ...form };
      if (avatarData) payload.avatarData = avatarData;
      if (removeAvatar) payload.removeAvatar = true;
      const r = await serverCall('updateProfile', payload, userId);
      setLoad('');
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); onSaved({ full_name:r.data.full_name, phone:r.data.phone, avatar:r.data.avatar }); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Update failed' }); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'500px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header"><h3><i className="fas fa-user-edit"></i> Edit Profile</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <div className="form-group"><label><i className="fas fa-user"></i> Full Name *</label><input type="text" value={form.full_name} onChange={(e) => setForm({...form, full_name:e.target.value})} required /></div>
            <div className="form-group"><label><i className="fas fa-phone"></i> Phone</label><input type="tel" value={form.phone} onChange={(e) => setForm({...form, phone:e.target.value})} /></div>
            <AvatarUpload existingFileId={profile.avatar} avatarData={avatarData} onChange={handleAvatarChange} />
            <div className="form-group"><label><i className="fas fa-user-tag"></i> Role</label><div><span className={`role-badge role-${(profile.role||'').replace('_','-')}`}>{ROLE_LABELS[profile.role]||profile.role}</span> <span style={{fontSize:'13px', color:'#999', marginLeft:'8px'}}>(read-only)</span></div></div>
            <div className="form-actions">
              <button type="submit" className="btn btn-primary"><i className="fas fa-save"></i> Save Changes</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

function PasswordChangeModal({ userId, onClose, setLoad }) {
  const [form, setForm] = useState({ current:'', newPwd:'', confirm:'' });

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (form.newPwd !== form.confirm) { Swal.fire({ icon:'warning', text:'Passwords do not match' }); return; }
    if (form.newPwd.length < 6) { Swal.fire({ icon:'warning', text:'Min 6 characters' }); return; }
    setLoad('Changing password...');
    try {
      const r = await serverCall('changePassword', userId, form.current, form.newPwd);
      setLoad('');
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); onClose(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Failed' }); }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'450px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header"><h3><i className="fas fa-key"></i> Change Password</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <PasswordInput label="Current Password *" icon="fas fa-lock" value={form.current} onChange={(e) => setForm({...form, current:e.target.value})} required={true} />
            <PasswordInput label="New Password *" icon="fas fa-lock" value={form.newPwd} onChange={(e) => setForm({...form, newPwd:e.target.value})} placeholder="Min 6 characters" required={true} />
            <PasswordInput label="Confirm Password *" icon="fas fa-lock" value={form.confirm} onChange={(e) => setForm({...form, confirm:e.target.value})} required={true} />
            <div className="form-actions">
              <button type="submit" className="btn btn-primary"><i className="fas fa-key"></i> Change Password</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── Activity Logs ── */
function LogsView({ user }) {
  const _c = swrGet('logs');
  const [loading, setLoading] = useState(!_c);
  const [logs, setLogs] = useState(_c || []);
  const tableRef = useRef(null);
  const [filters, setFilters] = useState({ action:'', dateFrom:'', dateTo:'' });

  const actionOptions = [{ value:'LOGIN', label:'Login' },{ value:'CREATE', label:'Create' },{ value:'UPDATE', label:'Update' },{ value:'DELETE', label:'Delete' },{ value:'CHANGE_PWD', label:'Password Change' },{ value:'TOGGLE_STATUS', label:'Toggle Status' }];

  useEffect(() => { if (_c) setTimeout(() => initTable(_c), 150); loadLogs(); return () => { dtCleanup(); if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }; }, []);

  const loadLogs = async () => {
    if (!_c) setLoading(true);
    try {
      const r = await serverCall('getLogs', user.id, user.role, 200);
      setLoading(false);
      if (r.success) { swrSet('logs', r.data); setLogs(r.data); initTable(r.data); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load logs' }); }
  };

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#logsTable').empty(); } catch(e){} }
    setTimeout(() => {
      try {
        const t = $('#logsTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'id', title:'ID' },
            { data:'username', title:'User' },
            { data:'action', title:'Action', render:(d) => { const c = d==='LOGIN'?'log-login':d==='CREATE'?'log-create':d==='UPDATE'||d==='CHANGE_PWD'||d==='TOGGLE_STATUS'?'log-update':d==='DELETE'?'log-delete':'log-default'; return '<span class="recent-log-action '+c+'">'+d+'</span>'; } },
            { data:'table_name', title:'Table' },
            { data:'record_id', title:'Record ID' },
            { data:'details', title:'Details' },
            { data:'created_at', title:'Date', render:(d) => fmtDate(d) }
          ],
          pageUnit:10, lengthMenu:[[10,25,50,100],[10,25,50,100]], responsive:true, dom:'Blfrtip',
          buttons:[{ extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV' },{ extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF' },{ extend:'print', text:'<i class="fas fa-print"></i> Print' }],
          order:[[0,'desc']]
        });
        tableRef.current = t;
      } catch(e) { console.error('Logs table:', e); }
    }, 150);
  };

  const applyFilters = () => {
    if (!tableRef.current) return;
    const dt = tableRef.current;
    while ($.fn.dataTable.ext.search.length>0) $.fn.dataTable.ext.search.pop();
    if (filters.dateFrom || filters.dateTo) {
      $.fn.dataTable.ext.search.push((s,sd,idx) => {
        const row = dt.row(idx).data(); if (!row) return true;
        const d = new Date(row.created_at);
        if (filters.dateFrom && d < new Date(filters.dateFrom)) return false;
        if (filters.dateTo && d > new Date(filters.dateTo+'T23:59:59')) return false;
        return true;
      });
    }
    dt.columns().search('');
    if (filters.action) dt.column(2).search(filters.action);
    dt.draw();
  };
  const clearFilters = () => { setFilters({ action:'', dateFrom:'', dateTo:'' }); if (tableRef.current) { while ($.fn.dataTable.ext.search.length>0) $.fn.dataTable.ext.search.pop(); tableRef.current.columns().search('').draw(); } };
  useEffect(() => { if (tableRef.current && logs.length>0) applyFilters(); }, [filters]);

  return (
    <div className="data-section">
      <div className="section-header"><h2><i className="fas fa-history"></i> Activity Logs</h2><button className="btn btn-primary btn-sm" onClick={loadLogs}><i className="fas fa-sync-alt"></i> Refresh</button></div>
      {!loading && (
        <div className="filters-section">
          <div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearFilters}><i className="fas fa-times-circle"></i> Clear All</button></div>
          <div className="filters-grid">
            <SearchableDropdown label="Action" icon="fas fa-bolt" options={actionOptions} value={filters.action} onChange={(v) => setFilters({...filters, action:v})} placeholder="All Actions" />
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={(e) => setFilters({...filters, dateFrom:e.target.value})} /></div>
            <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> Date To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={(e) => setFilters({...filters, dateTo:e.target.value})} /></div>
          </div>
        </div>
      )}
      {loading && <TableSkeleton rows={8} columns={6} />}
      <div style={{ display:loading?'none':'block' }}><table id="logsTable" className="display" style={{width:'100%'}}></table></div>
    </div>
  );
}

/* ── Categories ── */
function CategoriesView({ user }) {
  const _c = swrGet('cats');
  const [loading, setLoading] = useState(!_c);
  const [categories, setCategories] = useState(_c || []);
  const [viewMode, setViewMode] = useState('table');
  const [showModal, setShowModal] = useState(false);
  const [editingCat, setEditingCat] = useState(null);
  const [selectedCat, setSelectedCat] = useState(null);
  const [load, setLoad] = useState('');
  const tableRef = useRef(null);
  const canWrite = user.role === 'admin' || user.role === 'manager';
  const canDelete = user.role === 'admin';

  useEffect(() => { if (_c && viewMode === 'table') setTimeout(() => initTable(_c), 150); loadCategories(); return () => { if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }; }, []);

  const loadCategories = async () => {
    if (!_c) setLoading(true);
    try {
      const r = await serverCall('getCategories', user.id, user.role);
      setLoading(false);
      if (r.success) { swrSet('cats', r.data); setCategories(r.data); if (viewMode === 'table') setTimeout(() => initTable(r.data), 150); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load categories' }); }
  };

  useEffect(() => {
    if (!loading && categories.length > 0) {
      if (viewMode === 'table') setTimeout(() => initTable(categories), 150);
      else { if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } }
    }
  }, [viewMode]);

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#catTable').empty(); } catch(e){} }
    setTimeout(() => {
      try {
        const t = $('#catTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'name', title:'Category Name', render:(d) => '<strong>' + d + '</strong>' },
            { data:'description', title:'Description', render:(d) => d && d.length > 50 ? d.substring(0,50) + '...' : (d || '<span style="color:#ccc">—</span>') },
            { data:'sub_count', title:'Batches', className:'dt-center', render:(d) => '<span class="sub-badge ' + (d===0?'zero':'') + '">' + d + '</span>' },
            { data:'is_active', title:'Status', render:(d,_,row) => canWrite ? '<button class="action-icon toggle-icon ' + (d==1?'':'off') + '" data-action="toggle"><i class="fas ' + (d==1?'fa-toggle-on':'fa-toggle-off') + '"></i></button>' : '<span class="status-dot ' + (d==1?'active':'inactive') + '"></span>' + (d==1?'Active':'Inactive') },
            { data:'created_by_name', title:'Created By' },
            { data:'created_at', title:'Date', render:(d) => fmtDateShort(d) },
            { data:null, title:'Actions', orderable:false, render:(_,__,row) => {
              let h = '';
              if (canWrite) h += '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button>';
              if (canDelete) {
                if (row.sub_count > 0) h += '<button class="action-icon delete-icon disabled" title="Cannot delete — has batches"><i class="fas fa-trash"></i></button>';
                else h += '<button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>';
              }
              return h || '—';
            }}
          ],
          pageUnit:10, lengthMenu:[[10,25,50,-1],[10,25,50,"All"]], responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV', exportOptions:{columns:[0,1,2,4,5]} },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF', exportOptions:{columns:[0,1,2,4,5]} },
            { extend:'print', text:'<i class="fas fa-print"></i> Print', exportOptions:{columns:[0,1,2,4,5]} }
          ],
          order:[[5,'desc']]
        });

        $('#catTable').off('click', '.action-icon');
        $('#catTable').on('click', '.action-icon', function() {
          if ($(this).hasClass('disabled')) return;
          const action = $(this).data('action');
          const row = t.row($(this).parents('tr')).data();
          if (action === 'edit') { setEditingCat(row); setShowModal(true); }
          else if (action === 'toggle') handleToggle(row);
          else if (action === 'delete') handleDelete(row);
        });
        tableRef.current = t;
      } catch(e) { console.error('CatTable:', e); }
    }, 50);
  };

  const handleSave = async (formData) => {
    setLoad(editingCat ? 'Updating...' : 'Adding...');
    try {
      let r;
      if (editingCat) r = await serverCall('updateCategory', { ...formData, id: editingCat.id }, user.id, user.role);
      else r = await serverCall('addCategory', formData, user.id, user.role);
      setLoad('');
      if (r.success) { setShowModal(false); setEditingCat(null); Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadCategories(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Operation failed' }); }
  };

  const handleToggle = async (cat) => {
    setLoad('Updating...');
    try {
      const r = await serverCall('toggleCategoryStatus', cat.id, user.id, user.role);
      setLoad('');
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1200, showConfirmButton:false }); loadCategories(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); }
  };

  const handleDelete = (cat) => {
    Swal.fire({ icon:'warning', title:'Delete Category?', text:'Delete "' + cat.name + '"? This cannot be undone.', showCancelButton:true, confirmButtonColor:'#ea4335', confirmButtonText:'Delete' }).then(async (res) => {
      if (res.isConfirmed) {
        setLoad('Deleting...');
        try {
          const r = await serverCall('deleteCategory', cat.id, user.id, user.role);
          setLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadCategories(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Delete failed' }); }
      }
    });
  };

  return (
    <div className="data-section">
      <div className="section-header">
        <h2><i className="fas fa-th-large"></i> Categories</h2>
        <div style={{display:'flex', gap:'12px', alignItems:'center'}}>
          <div className="view-toggle">
            <button className={viewMode==='table'?'active':''} onClick={() => setViewMode('table')}><i className="fas fa-table"></i> Table</button>
            <button className={viewMode==='cards'?'active':''} onClick={() => setViewMode('cards')}><i className="fas fa-th-large"></i> Cards</button>
          </div>
          {canWrite && <button className="btn btn-success" onClick={() => { setEditingCat(null); setShowModal(true); }}><i className="fas fa-plus"></i> Add Category</button>}
        </div>
      </div>

      {loading && <TableSkeleton rows={5} columns={6} />}

      {/* Table View */}
      <div style={{ display: !loading && viewMode==='table' ? 'block' : 'none' }}>
        <table id="catTable" className="display" style={{width:'100%'}}></table>
      </div>

      {/* Card View */}
      {!loading && viewMode==='cards' && (
        categories.length > 0 ? (
          <div className="cat-grid">
            {categories.map(cat => (
              <div key={cat.id} className={`cat-card ${cat.is_active ? '' : 'inactive'}`} onClick={() => setSelectedCat(cat)}>
                <div className="cat-card-header">
                  <div className="cat-card-name">{cat.name}</div>
                  <span className={`sub-badge ${cat.sub_count===0?'zero':''}`}>{cat.sub_count}</span>
                </div>
                <div className="cat-card-desc">{cat.description ? (cat.description.length > 80 ? cat.description.substring(0,80) + '...' : cat.description) : 'No description'}</div>
                <div className="cat-card-footer">
                  <span className="cat-card-meta"><i className="fas fa-user"></i> {cat.created_by_name}</span>
                  <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                    {canWrite && (
                      <div className="toggle-container" onClick={(e) => { e.stopPropagation(); handleToggle(cat); }} style={{marginBottom:0}}>
                        <div className={`toggle-track ${cat.is_active ? 'active' : ''}`} style={{unit_qty:'38px', height:'20px'}}><div className="toggle-thumb" style={{unit_qty:'16px', height:'16px', left: cat.is_active ? '20px' : '2px'}}></div></div>
                      </div>
                    )}
                    {canWrite && <button className="action-icon edit-icon" onClick={(e) => { e.stopPropagation(); setEditingCat(cat); setShowModal(true); }} title="Edit"><i className="fas fa-edit"></i></button>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div className="empty-state"><i className="fas fa-inbox"></i><p>No categories yet</p></div>
        )
      )}

      {/* Batches Detail Modal */}
      {selectedCat && (
        <div className="modal-overlay" onClick={() => setSelectedCat(null)}>
          <div className="modal" style={{maxWidth:'500px'}} onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-sitemap"></i> {selectedCat.name}</h3>
              <button className="close-btn" onClick={() => setSelectedCat(null)}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <div style={{marginBottom:'16px'}}>
                <p style={{color:'#555', marginBottom:'8px'}}>{selectedCat.description || 'No description'}</p>
                <div style={{display:'flex', gap:'12px', fontSize:'13px', color:'#888'}}>
                  <span><i className="fas fa-user"></i> {selectedCat.created_by_name}</span>
                  <span><i className="fas fa-calendar"></i> {fmtDateShort(selectedCat.created_at)}</span>
                  <span className={`status-badge ${selectedCat.is_active ? 'status-active' : 'status-inactive'}`}>{selectedCat.is_active ? 'Active' : 'Inactive'}</span>
                </div>
              </div>
              <h4 style={{color:'var(--navy-primary)', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px'}}><i className="fas fa-list"></i> Batches <span className={`sub-badge ${selectedCat.sub_count===0?'zero':''}`}>{selectedCat.sub_count}</span></h4>
              {selectedCat.sub_count === 0 ? (
                <div className="empty-state"><i className="fas fa-inbox"></i><p>No batches linked yet</p></div>
              ) : (
                <p style={{color:'#666', fontSize:'14px'}}>Sub-categories will be listed here when the module is added.</p>
              )}
            </div>
          </div>
        </div>
      )}

      {showModal && <CategoryModal editCat={editingCat} onClose={() => { setShowModal(false); setEditingCat(null); }} onSave={handleSave} />}
      {load && <div className="loading-ov"><div className="loading-popup"><div className="loading-progress"><div className="loading-progress-bar"></div></div><div className="loading-txt">{load}</div></div></div>}
    </div>
  );
}

/* ── Category Modal ── */
function CategoryModal({ editCat, onClose, onSave }) {
  const [form, setForm] = useState({
    name: editCat?.name || '',
    description: editCat?.description || '',
    is_active: editCat ? (editCat.is_active == 1) : true
  });
  const [nameError, setNameError] = useState('');
  const [nameOk, setNameOk] = useState(false);
  const [checking, setChecking] = useState(false);

  const handleNameBlur = async () => {
    const n = form.name.trim();
    if (!n) { setNameError(''); setNameOk(false); return; }
    if (editCat && n === editCat.name) { setNameError(''); setNameOk(false); return; }
    setChecking(true);
    try {
      const r = await serverCall('checkCategoryName', n, editCat?.id || 0);
      setChecking(false);
      if (r.success && r.exists) { setNameError('Category name already exists'); setNameOk(false); }
      else { setNameError(''); setNameOk(true); }
    } catch(e) { setChecking(false); }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (nameError) { Swal.fire({ icon:'warning', text:'Fix validation errors first' }); return; }
    onSave({ name: form.name, description: form.description, is_active: form.is_active ? 1 : 0 });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'520px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className={editCat ? 'fas fa-edit' : 'fas fa-plus-circle'}></i> {editCat ? 'Edit' : 'Add'} Category</h3>
          <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label><i className="fas fa-tag"></i> Category Name *</label>
              <input type="text" value={form.name} onChange={(e) => { setForm({...form, name:e.target.value}); setNameError(''); setNameOk(false); }} onBlur={handleNameBlur} required />
              {checking && <div className="field-ok"><i className="fas fa-spinner fa-spin"></i> Checking...</div>}
              {nameError && <div className="field-error"><i className="fas fa-exclamation-circle"></i> {nameError}</div>}
              {nameOk && <div className="field-ok"><i className="fas fa-check-circle"></i> Name available</div>}
            </div>
            <div className="form-group">
              <label><i className="fas fa-align-left"></i> Description</label>
              <textarea rows="3" value={form.description} onChange={(e) => setForm({...form, description:e.target.value})} style={{resize:'vertical'}}></textarea>

              <button type="submit" className="btn btn-primary"><i className="fas fa-save"></i> {editCat ? 'Update' : 'Save'}</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>

}

/* ── Batches (Cars) ── */
function SubCategoriesView({ user }) {
  const _c = swrGet('subcats');
  const [loading, setLoading] = useState(!_c);
  const [subCats, setSubCats] = useState(_c || []);
  const [categories, setCategories] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editingSC, setEditingSC] = useState(null);
  const [detailBatch, setDetailBatch] = useState(null);
  const [load, setLoad] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const tableRef = useRef(null);
  const canWrite = user.role === 'admin' || user.role === 'manager' || user.role === 'store_staff';
  const canDelete = user.role === 'admin';

  useEffect(() => {
    if (_c) setTimeout(() => initTable(_c), 150);
    loadData();
    return () => { if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; } catch(e){} } };
  }, []);

  const loadData = async () => {
    if (!_c) setLoading(true);
    try {
      const [scRes, catRes] = await Promise.all([
        serverCall('getSubCategories', user.id, user.role),
        serverCall('getCategoriesForDropdown')
      ]);
      setLoading(false);
      if (scRes.success) { swrSet('subcats', scRes.data); setSubCats(scRes.data); initTable(scRes.data); }
      else Swal.fire({ icon:'error', text:scRes.message });
      if (catRes.success) setCategories(catRes.data);
    } catch(e) { setLoading(false); Swal.fire({ icon:'error', text:'Failed to load data' }); }
  };

  // quick stats from loaded data
  const qStats = React.useMemo(() => {
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay()); weekStart.setHours(0,0,0,0);
    return {
      activeBatches: subCats.filter(s => s.is_active).length,
      thisWeek: subCats.filter(s => { if (!s.arrival_date) return false; const d = new Date(s.arrival_date); return d >= weekStart && d <= now; }).length,
      totalStock: subCats.reduce((s,c) => s + c.available_pieces, 0),
      totalValue: subCats.reduce((s,c) => s + c.stock_value, 0)
    };
  }, [subCats]);

  const initTable = (data) => {
    if (tableRef.current) { try { tableRef.current.destroy(); tableRef.current=null; $('#scTable').empty(); } catch(e){} }
    setTimeout(() => {
      try {
        const t = $('#scTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'name', title:'Batch Name', render:(d) => '<a class="batch-link" data-action="detail">' + d + '</a>' },
            { data:'category_name', title:'Category', render:(d) => '<span class="role-badge role-manager">' + d + '</span>' },
            { data:'arrival_date', title:'Arrival Date', render:(d) => d ? fmtDateShort(d) : '<span style="color:#ccc">—</span>' },
            { data:'total_pieces', title:'Total Pieces', className:'dt-center', render:(d) => '<span class="piece-badge total">' + d + '</span>' },
            { data:'available_pieces', title:'Available', className:'dt-center', render:(d) => '<span class="piece-badge avail">' + d + '</span>' },
            { data:'sold_pieces', title:'Sold', className:'dt-center', render:(d) => '<span class="piece-badge sold">' + d + '</span>' },
            { data:'is_active', title:'Status', render:(d) => canWrite ? '<button class="action-icon toggle-icon ' + (d==1?'':'off') + '" data-action="toggle"><i class="fas ' + (d==1?'fa-toggle-on':'fa-toggle-off') + '"></i></button>' : '<span class="status-dot ' + (d==1?'active':'inactive') + '"></span>' + (d==1?'Active':'Inactive') },
            { data:null, title:'Actions', orderable:false, render:(_,__,row) => {
              let h = '';
              if (canWrite) h += '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button>';
              if (canDelete) {
                if (row.total_pieces > 0) h += '<button class="action-icon delete-icon disabled" title="Has linked products"><i class="fas fa-trash"></i></button>';
                else h += '<button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>';
              }
              return h || '—';
            }}
          ],
          pageUnit:10, lengthMenu:[[10,25,50,-1],[10,25,50,"All"]], responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV', exportOptions:{columns:[0,1,2,3,4,5]} },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF', exportOptions:{columns:[0,1,2,3,4,5]} },
            { extend:'print', text:'<i class="fas fa-print"></i> Print', exportOptions:{columns:[0,1,2,3,4,5]} }
          ],
          order:[[2,'desc']]
        });

        $('#scTable').off('click', '.batch-link, .action-icon');
        $('#scTable').on('click', '.batch-link', function() { const row = t.row($(this).parents('tr')).data(); setDetailBatch(row); });
        $('#scTable').on('click', '.action-icon', function() {
          if ($(this).hasClass('disabled')) return;
          const action = $(this).data('action');
          const row = t.row($(this).parents('tr')).data();
          if (action === 'edit') { setEditingSC(row); setShowModal(true); }
          else if (action === 'toggle') handleToggle(row);
          else if (action === 'delete') handleDelete(row);
        });
        tableRef.current = t;
      } catch(e) { console.error('scTable:', e); }
    }, 150);
  };

  // filter by category
  useEffect(() => {
    if (!tableRef.current || subCats.length === 0) return;
    const dt = tableRef.current;
    dt.column(1).search(filterCat ? categories.find(c => c.id == filterCat)?.name || '' : '').draw();
  }, [filterCat]);

  const handleSave = async (formData) => {
    setLoad(editingSC ? 'Updating...' : 'Adding...');
    try {
      let r;
      if (editingSC) r = await serverCall('updateSubCategory', { ...formData, id: editingSC.id }, user.id, user.role);
      else r = await serverCall('addSubCategory', formData, user.id, user.role);
      setLoad('');
      if (r.success) { setShowModal(false); setEditingSC(null); Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadData(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Operation failed' }); }
  };

  const handleToggle = async (sc) => {
    setLoad('Updating...');
    try {
      const r = await serverCall('toggleSubCatStatus', sc.id, user.id, user.role);
      setLoad('');
      if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1200, showConfirmButton:false }); loadData(); }
      else Swal.fire({ icon:'error', text:r.message });
    } catch(e) { setLoad(''); }
  };

  const handleDelete = (sc) => {
    Swal.fire({ icon:'warning', title:'Delete Batch?', text:'Delete "' + sc.name + '"?', showCancelButton:true, confirmButtonColor:'#ea4335', confirmButtonText:'Delete' }).then(async (res) => {
      if (res.isConfirmed) {
        setLoad('Deleting...');
        try {
          const r = await serverCall('deleteSubCategory', sc.id, user.id, user.role);
          setLoad('');
          if (r.success) { Swal.fire({ icon:'success', text:r.message, timer:1500, showConfirmButton:false }); loadData(); }
          else Swal.fire({ icon:'error', text:r.message });
        } catch(e) { setLoad(''); Swal.fire({ icon:'error', text:'Delete failed' }); }
      }
    });
  };

  const catOptions = categories.map(c => ({ value: String(c.id), label: c.name }));

  return (
    <div>
      {/* quick stats */}
      {!loading && (
        <div className="quick-stats">
          <div className="quick-stat"><div className="quick-stat-icon" style={{background:'var(--navy-primary)'}}><i className="fas fa-boxes"></i></div><div><div className="quick-stat-val">{qStats.activeBatches}</div><div className="quick-stat-lbl">Active Batches</div></div></div>
          <div className="quick-stat"><div className="quick-stat-icon" style={{background:'var(--navy-accent)'}}><i className="fas fa-calendar-week"></i></div><div><div className="quick-stat-val">{qStats.thisWeek}</div><div className="quick-stat-lbl">This Week Arrivals</div></div></div>
          <div className="quick-stat"><div className="quick-stat-icon" style={{background:'#34a853'}}><i className="fas fa-cubes"></i></div><div><div className="quick-stat-val">{qStats.totalStock}</div><div className="quick-stat-lbl">Products in Stock</div></div></div>
          <div className="quick-stat"><div className="quick-stat-icon" style={{background:'#6f42c1'}}><i className="fas fa-coins"></i></div><div><div className="quick-stat-val">{qStats.totalValue.toLocaleString()}</div><div className="quick-stat-lbl">Value in Stock</div></div></div>
        </div>
      )}

      <div className="data-section">
        <div className="section-header">
          <h2><i className="fas fa-boxes"></i> Batches / Shipments</h2>
          {canWrite && <button className="btn btn-success" onClick={() => { setEditingSC(null); setShowModal(true); }}><i className="fas fa-plus"></i> Add Car</button>}
        </div>

        {/* category filter */}
        {!loading && (
          <div className="filters-section">
            <div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={() => setFilterCat('')}><i className="fas fa-times-circle"></i> Clear</button></div>
            <div className="filters-grid">
              <SearchableDropdown label="Category" icon="fas fa-th-large" options={catOptions} value={filterCat} onChange={setFilterCat} placeholder="All Categories" />
            </div>
          </div>
        )}

        {loading && <TableSkeleton rows={6} columns={8} />}
        <div style={{ display: loading ? 'none' : 'block' }}>
          <table id="scTable" className="display" style={{width:'100%'}}></table>
        </div>
      </div>

      {showModal && <SubCatModal editSC={editingSC} catOptions={catOptions} onClose={() => { setShowModal(false); setEditingSC(null); }} onSave={handleSave} />}
      {detailBatch && <SubCatDetailModal car={detailBatch} onClose={() => setDetailBatch(null)} />}
      {load && <div className="loading-ov"><div className="loading-popup"><div className="loading-progress"><div className="loading-progress-bar"></div></div><div className="loading-txt">{load}</div></div></div>}
    </div>
  );
}

/* ── SubCat Modal ── */
function SubCatModal({ editSC, catOptions, onClose, onSave }) {
  const [form, setForm] = useState({
    category_id: editSC ? String(editSC.category_id) : '',
    name: editSC?.name || '',
    arrival_date: editSC?.arrival_date || '',
    description: editSC?.description || '',
    is_active: editSC ? (editSC.is_active == 1) : true
  });

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.category_id) { Swal.fire({ icon:'warning', text:'Select a category' }); return; }
    onSave({ ...form, is_active: form.is_active ? 1 : 0 });
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'560px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className={editSC ? 'fas fa-edit' : 'fas fa-plus-circle'}></i> {editSC ? 'Edit' : 'Add'} Batch</h3>
          <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        <div className="modal-body">
          <form onSubmit={handleSubmit}>
            <SearchableDropdown label="Category" icon="fas fa-th-large" options={catOptions} value={form.category_id} onChange={(v) => setForm({...form, category_id:v})} placeholder="Select category..." required />
            <div className="form-group"><label><i className="fas fa-tag"></i> Batch Name *</label><input type="text" value={form.name} onChange={(e) => setForm({...form, name:e.target.value})} placeholder="e.g., Batch A - Apr 10, Shipment 2026" required /></div>
            <div className="form-group"><label><i className="fas fa-calendar-alt"></i> Arrival Date</label><input type="date" value={form.arrival_date} onChange={(e) => setForm({...form, arrival_date:e.target.value})} /></div>
            <div className="form-group"><label><i className="fas fa-align-left"></i> Description</label><textarea rows="3" value={form.description} onChange={(e) => setForm({...form, description:e.target.value})} style={{resize:'vertical'}}></textarea></div>
            <ToggleSwitch label="Status" checked={form.is_active} onChange={(v) => setForm({...form, is_active:v})} />
            <div className="form-actions">
              <button type="submit" className="btn btn-primary"><i className="fas fa-save"></i> {editSC ? 'Update' : 'Save'}</button>
              <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── SubCat Detail Modal ── */
function SubCatDetailModal({ car, onClose }) {
  const [stocks, setStocks] = useState([]);
  const [loadingStocks, setLoadingStocks] = useState(true);
  const detailTableRef = useRef(null);

  useEffect(() => {
    loadStocks();
    return () => { if (detailTableRef.current) { try { detailTableRef.current.destroy(); detailTableRef.current=null; } catch(e){} } };
  }, []);

  const loadStocks = async () => {
    try {
      const r = await serverCall('getSubCatProducts', car.id);
      setLoadingStocks(false);
      if (r.success && r.data.length > 0) {
        setStocks(r.data);
        setTimeout(() => initStocksTable(r.data), 150);
      }
    } catch(e) { setLoadingStocks(false); }
  };

  const initStocksTable = (data) => {
    if (detailTableRef.current) { try { detailTableRef.current.destroy(); } catch(e){} }
    setTimeout(() => {
      try {
        detailTableRef.current = $('#detailStocksTable').DataTable({
          data, destroy:true,
          columns:[
            { data:'serial', title:'Serial #' },
            { data:'qty', title:'Qty', className:'dt-center', render:(d) => d > 1 ? '<span class="piece-badge total">' + d + '</span>' : (d||1) },
            { data:'width', title:'Unit Qty' },
            { data:'length', title:'Unit' },
            { data:'cft', title:'Stock', render:(d) => (d || 0).toFixed(2) },
            { data:'status', title:'Status', render:(d) => '<span class="piece-badge ' + (d==='available'?'avail':d==='sold'?'sold':'total') + '">' + (d||'-') + '</span>' },
            { data:'sell_price', title:'Sell Price', render:(d) => CS() + (d || 0).toLocaleString() }
          ],
          pageUnit:10, responsive:true, dom:'lfrtip', order:[[0,'asc']]
        });
      } catch(e) {}
    }, 50);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'900px'}} onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3><i className="fas fa-boxes"></i> {batch.name} <span style={{fontSize:'14px', opacity:0.8, marginLeft:'8px'}}>({batch.category_name})</span></h3>
          <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
        </div>
        <div className="modal-body">
          {batch.description && <p style={{color:'#666', marginBottom:'16px', fontSize:'14px'}}>{batch.description}</p>}
          {batch.arrival_date && <p style={{color:'#888', marginBottom:'20px', fontSize:'13px'}}><i className="fas fa-calendar-alt"></i> Arrived: {fmtDateShort(batch.arrival_date)}</p>}

          {/* stat cards */}
          <div className="detail-stats">
            <div className="detail-stat"><div className="detail-stat-val">{batch.total_pieces}</div><div className="detail-stat-lbl">Total Pieces</div></div>
            <div className="detail-stat" style={{borderColor:'#34a853'}}><div className="detail-stat-val" style={{color:'#2e7d32'}}>{batch.available_pieces}</div><div className="detail-stat-lbl">Available</div></div>
            <div className="detail-stat" style={{borderColor:'#ea4335'}}><div className="detail-stat-val" style={{color:'#c62828'}}>{batch.sold_pieces}</div><div className="detail-stat-lbl">Sold</div></div>
            <div className="detail-stat"><div className="detail-stat-val">{batch.total_qty}</div><div className="detail-stat-lbl">Total Stock</div></div>
            <div className="detail-stat"><div className="detail-stat-val">{batch.stock_value.toLocaleString()}</div><div className="detail-stat-lbl">Stock Value</div></div>
          </div>

          {/* products table */}
          <h4 style={{color:'var(--navy-primary)', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px'}}><i className="fas fa-layer-group"></i> Products</h4>
          {loadingStocks ? <TableSkeleton rows={3} columns={6} /> : (
            stocks.length > 0 ? (
              <table id="detailStocksTable" className="display" style={{width:'100%'}}></table>
            ) : (
              <div className="empty-state"><i className="fas fa-inbox"></i><p>No products in this batch yet</p></div>
            )
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Suppliers ── */
function SuppliersView({ user, openLedger }) {
  const _c = swrGet('suppliers');
  const [loading, setLoading] = useState(!_c);
  const [suppliers, setSuppliers] = useState(_c || []);
  const [showModal, setShowModal] = useState(false);

      try {
        const t = $('#suppTable').DataTable({

            { data:'total_due', title:'Total Due', render:(d) => d > 0 ? '<span class="due-amount">' + d.toLocaleString() + '</span>' : '<span style="color:#aaa">0</span>' },
            { data:'is_active', title:'Status', render:(d) => canWrite ? '<button class="action-icon toggle-icon ' + (d==1?'':'off') + '" data-action="toggle"><i class="fas ' + (d==1?'fa-toggle-on':'fa-toggle-off') + '"></i></button>' : '<span class="status-dot ' + (d==1?'active':'inactive') + '"></span>' + (d==1?'Active':'Inactive') },
            { data:null, title:'Actions', orderable:false, render:(_,__,row) => {
              let h = '';
              if (canWrite) h += '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button>';
              h += '<button class="action-icon ledger-icon" data-action="ledger" title="View Ledger"><i class="fas fa-file-invoice-dollar"></i></button>';

                if (row.purchase_count > 0) h += '<button class="action-icon delete-icon disabled" title="Has linked purchases"><i class="fas fa-trash"></i></button>';
                else h += '<button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>';
              }
              return h;
            }}
          ],
          pageUnit:10, lengthMenu:[[10,25,50,-1],[10,25,50,"All"]], responsive:true, dom:'Blfrtip',
          buttons:[
            { extend:'csv', text:'<i class="fas fa-file-csv"></i> CSV', exportOptions:{columns:[0,1,2,3,4,5]} },
            { extend:'pdf', text:'<i class="fas fa-file-pdf"></i> PDF', exportOptions:{columns:[0,1,2,3,4,5]} },
            { extend:'print', text:'<i class="fas fa-print"></i> Print', exportOptions:{columns:[0,1,2,3,4,5]} }
          ],
          order:[[0,'desc']]
        });

        $('#suppTable').off('click', '.action-icon');
